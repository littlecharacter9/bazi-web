<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>八戒命理 - 八字命理助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1c1c1e;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ========== 左侧边栏 ========== */
        .sidebar {
            width: 280px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .logo-area {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #e6b980 0%, #e6b980 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .logo-sub {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .new-chat-btn {
            margin: 20px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .new-chat-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .history-section {
            flex: 1;
            padding: 0 12px;
        }
        .history-title {
            font-size: 12px;
            color: #888;
            padding: 12px 12px 8px;
        }
        .history-list {
            list-style: none;
        }
        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.08);
        }

        .user-section {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: auto;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #e6b980;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #1a1a2e;
        }
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: white;
        }
        .user-email {
            font-size: 11px;
            color: #888;
        }

        /* ========== 右侧主内容区 ========== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #fff;
        }

        .main-header {
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
            background: #fff;
        }
        .main-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
        }
        .main-header p {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        .content-area {
            flex: 1;
            padding: 24px 30px;
            overflow-y: auto;
        }

        .form-card {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group label .required {
            color: #e74c3c;
            margin-left: 4px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #e6b980;
            box-shadow: 0 0 0 3px rgba(230,185,128,0.1);
        }

        .time-option-row {
            margin-bottom: 16px;
        }
        .time-toggle {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        .time-toggle label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }
        .time-toggle input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .warning-box {
            background: #fff3e0;
            border-left: 4px solid #e6b980;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #b86b00;
        }
        .true-solar-box {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #2e7d32;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
        }

        .module-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .module-btn {
            padding: 8px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .module-btn.active {
            background: #1a1a2e;
            color: white;
        }

        .analyze-btn {
            width: 100%;
            padding: 14px;
            background: #e6b980;
            color: #1a1a2e;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .analyze-btn:hover {
            background: #d4a06a;
        }
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-card {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 24px;
        }
        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .result-content {
            font-size: 14px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo">八戒命理</div>
            <div class="logo-sub">AI解析 · 仅供参考</div>
        </div>
        <div class="new-chat-btn" id="newChatBtn">
            <span>+</span> 新对话
        </div>
        <div class="history-section">
            <div class="history-title">最近对话</div>
            <ul class="history-list" id="historyList"></ul>
        </div>
        <div class="user-section">
            <div class="user-info">
                <div class="user-avatar">八</div>
                <div>
                    <div class="user-name">游客模式</div>
                    <div class="user-email">登录功能开发中</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="main-header">
            <h2>八字命盘分析</h2>
            <p>输入生辰信息，AI 辅助解析命盘格局</p>
        </div>

        <div class="content-area">
            <div class="form-card">
                <div class="form-row">
                    <div class="form-group">
                        <label>姓名 (选填)</label>
                        <input type="text" id="nameInput" placeholder="请输入姓名">
                    </div>
                    <div class="form-group">
                        <label>性别 <span class="required">*</span></label>
                        <select id="genderSelect">
                            <option value="">请选择</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>出生日期 <span class="required">*</span></label>
                        <input type="date" id="dateInput" value="">
                    </div>
                </div>

                <!-- 是否知道出生时间 -->
                <div class="time-option-row">
                    <div class="time-toggle">
                        <label>
                            <input type="radio" name="knowTime" value="yes" checked> 我知道出生时间
                        </label>
                        <label>
                            <input type="radio" name="knowTime" value="no"> 不清楚出生时间
                        </label>
                    </div>
                    <div id="timeWarning" class="warning-box" style="display: none;">
                        ⚠️ 未提供准确出生时间，分析准确率约30%-40%，结果仅供参考。
                    </div>
                </div>

                <div id="timeSelectArea">
                    <div class="form-row">
                        <div class="form-group">
                            <label>出生时间</label>
                            <select id="hourSelect">
                                <option value="">请选择时辰</option>
                                <option value="23">23时 子时 (23:00-00:59)</option>
                                <option value="0">0时 子时 (00:00-00:59)</option>
                                <option value="1">1时 丑时 (01:00-02:59)</option>
                                <option value="2">2时 丑时 (01:00-02:59)</option>
                                <option value="3">3时 寅时 (03:00-04:59)</option>
                                <option value="4">4时 寅时 (03:00-04:59)</option>
                                <option value="5">5时 卯时 (05:00-06:59)</option>
                                <option value="6">6时 卯时 (05:00-06:59)</option>
                                <option value="7">7时 辰时 (07:00-08:59)</option>
                                <option value="8">8时 辰时 (07:00-08:59)</option>
                                <option value="9">9时 巳时 (09:00-10:59)</option>
                                <option value="10">10时 巳时 (09:00-10:59)</option>
                                <option value="11">11时 午时 (11:00-12:59)</option>
                                <option value="12">12时 午时 (11:00-12:59)</option>
                                <option value="13">13时 未时 (13:00-14:59)</option>
                                <option value="14">14时 未时 (13:00-14:59)</option>
                                <option value="15">15时 申时 (15:00-16:59)</option>
                                <option value="16">16时 申时 (15:00-16:59)</option>
                                <option value="17">17时 酉时 (17:00-18:59)</option>
                                <option value="18">18时 酉时 (17:00-18:59)</option>
                                <option value="19">19时 戌时 (19:00-20:59)</option>
                                <option value="20">20时 戌时 (19:00-20:59)</option>
                                <option value="21">21时 亥时 (21:00-22:59)</option>
                                <option value="22">22时 亥时 (21:00-22:59)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>分钟</label>
                            <select id="minuteSelect">
                                <option value="0">00分</option>
                                <option value="15">15分</option>
                                <option value="30">30分</option>
                                <option value="45">45分</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>出生地点</label>
                        <input type="text" id="locationInput" placeholder="例如：四川省宜宾市（用于真太阳时校正）">
                    </div>
                </div>

                <!-- 真太阳时选项 -->
                <div class="checkbox-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="useTrueSolar"> 使用真太阳时（需填写出生地点）
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="useEarlyLate"> 使用早晚子时
                    </label>
                </div>

                <!-- 真太阳时结果显示区域 -->
                <div id="trueSolarResult" class="true-solar-box" style="display: none;"></div>

                <div class="module-buttons">
                    <button class="module-btn" data-module="overview">综合</button>
                    <button class="module-btn active" data-module="career">事业</button>
                    <button class="module-btn" data-module="wealth">财运</button>
                    <button class="module-btn" data-module="marriage">婚姻</button>
                    <button class="module-btn" data-module="liunian">流年</button>
                </div>

                <button class="analyze-btn" id="analyzeBtn">开始计算八字</button>
            </div>

            <div class="result-card" id="resultCard" style="display: none;">
                <div class="result-title">📊 分析结果</div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://bazi-api-production-0123.up.railway.app';
    let currentModule = 'career';
    let isLoading = false;
    let cachedLongitude = null;

    // 获取某天在一年中的第几天
    function getDayOfYear(date) {
        const start = new Date(date.getFullYear(), 0, 0);
        const diff = date - start;
        const oneDay = 86400000;
        return Math.floor(diff / oneDay);
    }

    // 真太阳时计算函数（纯前端实现）
    function calculateTrueSolarTime(date, hour, minute, longitude) {
        const dayOfYear = getDayOfYear(date);
        // 时差曲线参数（简化版，足够日常使用）
        const B = (dayOfYear - 1) * 2 * Math.PI / 365;
        // 时差公式（单位：分钟），精度约±1分钟
        let eqTime = 0.258 * Math.cos(B) - 7.416 * Math.sin(B) 
                    - 3.648 * Math.cos(2 * B) - 9.228 * Math.sin(2 * B);
        
        // 经度修正：每度4分钟，120°为东八区基准
        let lonCorrection = (longitude - 120) * 4;
        
        // 总偏移（分钟）
        let offsetMinutes = lonCorrection + eqTime;
        
        // 应用到用户输入的时间
        let totalMinutes = hour * 60 + minute + offsetMinutes;
        let newHour = Math.floor(totalMinutes / 60) % 24;
        let newMinute = Math.round(totalMinutes % 60);
        
        // 边界处理
        if (newMinute >= 60) {
            newMinute -= 60;
            newHour = (newHour + 1) % 24;
        }
        if (newMinute < 0) {
            newMinute += 60;
            newHour = (newHour - 1 + 24) % 24;
        }
        
        return { hour: newHour, minute: newMinute };
    }

    // 根据城市名称获取大致经度（简化版）
    function getLongitudeByCity(location) {
        if (!location) return null;
        
        const cityMap = {
            '北京': 116.40, '上海': 121.48, '广州': 113.27, '深圳': 114.07,
            '成都': 104.06, '重庆': 106.55, '杭州': 120.15, '武汉': 114.30,
            '西安': 108.95, '南京': 118.78, '天津': 117.20, '沈阳': 123.43,
            '青岛': 120.38, '长沙': 112.98, '昆明': 102.73, '贵阳': 106.63,
            '南宁': 108.32, '南昌': 115.89, '福州': 119.30, '合肥': 117.27,
            '郑州': 113.65, '太原': 112.56, '石家庄': 114.52, '哈尔滨': 126.64,
            '长春': 125.35, '呼和浩特': 111.65, '兰州': 103.82, '西宁': 101.78,
            '银川': 106.27, '乌鲁木齐': 87.62, '拉萨': 91.14, '海口': 110.35,
            '香港': 114.17, '澳门': 113.54, '台湾': 121.52
        };
        
        for (const [city, lon] of Object.entries(cityMap)) {
            if (location.includes(city)) {
                return lon;
            }
        }
        return null;  // 默认返回 null，使用北京时间
    }

    // 展示真太阳时计算结果
    function updateTrueSolarDisplay() {
        const useTrueSolar = document.getElementById('useTrueSolar').checked;
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        const trueSolarDiv = document.getElementById('trueSolarResult');
        
        if (!useTrueSolar || knowTime === 'no') {
            trueSolarDiv.style.display = 'none';
            return;
        }
        
        const location = document.getElementById('locationInput').value;
        const longitude = getLongitudeByCity(location);
        
        if (!location || !longitude) {
            trueSolarDiv.style.display = 'block';
            trueSolarDiv.innerHTML = '📍 请填写详细的出生地点（如：四川省宜宾市），以便进行真太阳时校正';
            trueSolarDiv.style.background = '#fff3e0';
            trueSolarDiv.style.borderLeftColor = '#e6b980';
            return;
        }
        
        const dateStr = document.getElementById('dateInput').value;
        const hour = parseInt(document.getElementById('hourSelect').value);
        const minute = parseInt(document.getElementById('minuteSelect').value);
        
        if (!dateStr || isNaN(hour)) {
            trueSolarDiv.style.display = 'block';
            trueSolarDiv.innerHTML = '⏰ 请先填写完整的出生日期和时间';
            return;
        }
        
        const date = new Date(dateStr);
        const trueTime = calculateTrueSolarTime(date, hour, minute, longitude);
        
        // 时辰映射
        const shichenMap = {
            23: '子', 0: '子', 1: '丑', 2: '丑', 3: '寅', 4: '寅',
            5: '卯', 6: '卯', 7: '辰', 8: '辰', 9: '巳', 10: '巳',
            11: '午', 12: '午', 13: '未', 14: '未', 15: '申', 16: '申',
            17: '酉', 18: '酉', 19: '戌', 20: '戌', 21: '亥', 22: '亥'
        };
        
        const originalShichen = shichenMap[hour] || '';
        const trueShichen = shichenMap[trueTime.hour] || '';
        
        trueSolarDiv.style.display = 'block';
        trueSolarDiv.style.background = '#e8f5e9';
        trueSolarDiv.style.borderLeftColor = '#4caf50';
        trueSolarDiv.innerHTML = `
            🌞 真太阳时校正结果<br>
            📍 ${location}（经度 ${longitude}°）<br>
            🕐 北京时间：${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}（${originalShichen}时）<br>
            🕐 真太阳时：${trueTime.hour.toString().padStart(2,'0')}:${trueTime.minute.toString().padStart(2,'0')}（${trueShichen}时）<br>
            ⚡ 分析将使用校正后的真太阳时
        `;
        
        // 缓存校正后的时间，供发送请求时使用
        cachedLongitude = longitude;
        return trueTime;
    }

    // 获取实际使用的出生时间（考虑真太阳时）
    function getActualBirthTime() {
        const useTrueSolar = document.getElementById('useTrueSolar').checked;
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        
        if (knowTime === 'no') {
            return null;
        }
        
        let hour = parseInt(document.getElementById('hourSelect').value);
        let minute = parseInt(document.getElementById('minuteSelect').value);
        
        if (useTrueSolar) {
            const location = document.getElementById('locationInput').value;
            const longitude = getLongitudeByCity(location);
            const dateStr = document.getElementById('dateInput').value;
            
            if (location && longitude && dateStr && !isNaN(hour)) {
                const date = new Date(dateStr);
                const trueTime = calculateTrueSolarTime(date, hour, minute, longitude);
                return { hour: trueTime.hour, minute: trueTime.minute };
            }
        }
        
        return { hour: hour, minute: minute };
    }

    // 监听相关输入变化，实时更新真太阳时显示
    document.getElementById('useTrueSolar').addEventListener('change', updateTrueSolarDisplay);
    document.getElementById('locationInput').addEventListener('input', updateTrueSolarDisplay);
    document.getElementById('dateInput').addEventListener('change', updateTrueSolarDisplay);
    document.getElementById('hourSelect').addEventListener('change', updateTrueSolarDisplay);
    document.getElementById('minuteSelect').addEventListener('change', updateTrueSolarDisplay);

    // 时间选项切换
    document.querySelectorAll('input[name="knowTime"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            const timeSelectArea = document.getElementById('timeSelectArea');
            const timeWarning = document.getElementById('timeWarning');
            if (e.target.value === 'yes') {
                timeSelectArea.style.display = 'block';
                timeWarning.style.display = 'none';
            } else {
                timeSelectArea.style.display = 'none';
                timeWarning.style.display = 'block';
                document.getElementById('trueSolarResult').style.display = 'none';
            }
            updateTrueSolarDisplay();
        });
    });

    // 模块切换
    document.querySelectorAll('.module-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentModule = btn.dataset.module;
        });
    });

    // 构建生辰字符串
    function buildBirthString() {
        const date = new Date(document.getElementById('dateInput').value);
        if (isNaN(date.getTime())) return null;
        
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const gender = document.getElementById('genderSelect').value;
        
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        
        if (knowTime === 'yes') {
            const actualTime = getActualBirthTime();
            if (!actualTime) return null;
            return `${year}.${month}.${day} ${actualTime.hour}时 ${actualTime.minute}分 ${gender}`;
        } else {
            return `${year}.${month}.${day} ${gender}`;
        }
    }

    // 验证必填项
    function validateForm() {
        if (!document.getElementById('genderSelect').value) {
            alert('请选择性别');
            return false;
        }
        if (!document.getElementById('dateInput').value) {
            alert('请选择出生日期');
            return false;
        }
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        if (knowTime === 'yes') {
            if (!document.getElementById('hourSelect').value) {
                alert('请选择出生时间');
                return false;
            }
        }
        return true;
    }

    // 添加历史记录
    function addHistory(birthStr) {
        const historyList = document.getElementById('historyList');
        const existingItems = Array.from(historyList.querySelectorAll('.history-item'));
        const exists = existingItems.some(item => item.dataset.birth === birthStr);
        if (!exists) {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.dataset.birth = birthStr;
            li.textContent = birthStr.length > 30 ? birthStr.substring(0, 30) + '...' : birthStr;
            li.onclick = () => {
                const match = birthStr.match(/(\d{4}\.\d{1,2}\.\d{1,2})\s+(\d{1,2})时\s+(\d+)分\s+([男女])/);
                if (match) {
                    const dateParts = match[1].split('.');
                    document.getElementById('dateInput').value = `${dateParts[0]}-${dateParts[1].padStart(2,'0')}-${dateParts[2].padStart(2,'0')}`;
                    document.getElementById('hourSelect').value = match[2];
                    document.getElementById('minuteSelect').value = match[3];
                    document.getElementById('genderSelect').value = match[4];
                    document.querySelector('input[name="knowTime"][value="yes"]').checked = true;
                    document.getElementById('timeSelectArea').style.display = 'block';
                    document.getElementById('timeWarning').style.display = 'none';
                    updateTrueSolarDisplay();
                } else {
                    const simpleMatch = birthStr.match(/(\d{4}\.\d{1,2}\.\d{1,2})\s+([男女])/);
                    if (simpleMatch) {
                        const dateParts = simpleMatch[1].split('.');
                        document.getElementById('dateInput').value = `${dateParts[0]}-${dateParts[1].padStart(2,'0')}-${dateParts[2].padStart(2,'0')}`;
                        document.getElementById('genderSelect').value = simpleMatch[2];
                        document.querySelector('input[name="knowTime"][value="no"]').checked = true;
                        document.getElementById('timeSelectArea').style.display = 'none';
                        document.getElementById('timeWarning').style.display = 'block';
                    }
                }
            };
            historyList.insertBefore(li, historyList.firstChild);
        }
    }

    function showResult(content) {
        let html = content.replace(/\n/g, '<br>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
        document.getElementById('resultContent').innerHTML = html;
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function newChat() {
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('resultContent').innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function analyze() {
        if (isLoading) return;
        if (!validateForm()) return;

        const birth = buildBirthString();
        if (!birth) {
            alert('请完整填写必填信息');
            return;
        }

        isLoading = true;
        const analyzeBtn = document.getElementById('analyzeBtn');
        analyzeBtn.disabled = true;
        analyzeBtn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> 分析中...';

        console.log(`[请求开始] 生辰: ${birth}, 模块: ${currentModule}`);

        try {
            const response = await fetch(`${API_URL}/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ birth: birth, module: currentModule })
            });
            const data = await response.json();

            if (data.success) {
                showResult(data.data.analysis);
                addHistory(birth);
            } else {
                showResult(`❌ 分析失败：${data.error || '未知错误'}`);
            }
        } catch (err) {
            console.error(err);
            showResult(`❌ 网络错误：${err.message}。请稍后重试。`);
        } finally {
            isLoading = false;
            analyzeBtn.disabled = false;
            analyzeBtn.innerHTML = '开始计算八字';
        }
    }

    document.getElementById('analyzeBtn').addEventListener('click', analyze);
    document.getElementById('newChatBtn').addEventListener('click', newChat);
</script>
</body>
</html>
