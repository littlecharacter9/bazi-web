<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>八戒命理 - 八字命理助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f7; color: #1c1c1e; height: 100vh; overflow: hidden; }
        .app { display: flex; height: 100vh; width: 100%; }
        .sidebar { width: 280px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .logo-area { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #e6b980 0%, #e6b980 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-sub { font-size: 12px; color: #888; margin-top: 6px; }
        .new-chat-btn { margin: 20px; padding: 12px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .new-chat-btn:hover { background: rgba(255,255,255,0.15); }
        .history-section { flex: 1; padding: 0 12px; }
        .history-title { font-size: 12px; color: #888; padding: 12px 12px 8px; }
        .history-list { list-style: none; }
        .history-item { padding: 10px 12px; border-radius: 10px; margin-bottom: 4px; cursor: pointer; font-size: 13px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: rgba(255,255,255,0.08); }
        .user-section { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; background: #e6b980; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #1a1a2e; }
        .user-name { font-size: 14px; font-weight: 500; color: white; }
        .user-email { font-size: 11px; color: #888; }
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #fff; }
        .main-header { padding: 20px 30px; border-bottom: 1px solid #eee; background: #fff; }
        .main-header h2 { font-size: 22px; font-weight: 600; color: #1a1a2e; }
        .main-header p { font-size: 13px; color: #888; margin-top: 4px; }
        .content-area { flex: 1; padding: 24px 30px; overflow-y: auto; }
        .form-card { background: #f9f9fb; border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 150px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #333; margin-bottom: 8px; }
        .form-group label .required { color: #e74c3c; margin-left: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 14px; outline: none; background: #fff; }
        .form-group input:focus, .form-group select:focus { border-color: #e6b980; }
        input[type="date"] { min-height: 46px; }
        .time-option-row { margin-bottom: 16px; }
        .time-toggle { display: flex; gap: 20px; margin-bottom: 16px; }
        .time-toggle label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: #333; }
        .time-toggle input { width: 18px; height: 18px; cursor: pointer; }
        .warning-box { background: #fff3e0; border-left: 4px solid #e6b980; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 13px; color: #b86b00; }
        .true-solar-box { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 13px; color: #2e7d32; }
        .checkbox-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #333; cursor: pointer; }
        .module-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .module-btn { padding: 8px 20px; background: #f0f0f0; border: none; border-radius: 30px; font-size: 14px; color: #666; cursor: pointer; }
        .module-btn.active { background: #1a1a2e; color: white; }
        .analyze-btn { width: 100%; padding: 14px; background: #e6b980; color: #1a1a2e; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-card { background: #f9f9fb; border-radius: 20px; padding: 24px; }
        .result-title { font-size: 16px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
        .result-content { font-size: 14px; line-height: 1.7; color: #333; white-space: pre-wrap; }
        .loading-dots { display: inline-flex; gap: 4px; }
        .loading-dots span { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
        .location-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .location-select { flex: 1; min-width: 100px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo-area"><div class="logo">八戒命理</div><div class="logo-sub">AI解析 · 仅供参考</div></div>
        <div class="new-chat-btn" id="newChatBtn"><span>+</span> 新对话</div>
        <div class="history-section"><div class="history-title">最近对话</div><ul class="history-list" id="historyList"></ul></div>
        <div class="user-section"><div class="user-info"><div class="user-avatar">八</div><div><div class="user-name">游客模式</div><div class="user-email">登录功能开发中</div></div></div></div>
    </div>
    <div class="main">
        <div class="main-header"><h2>八字命盘分析</h2><p>输入生辰信息，AI 辅助解析命盘格局</p></div>
        <div class="content-area">
            <div class="form-card">
                <div class="form-row">
                    <div class="form-group"><label>姓名 (选填)</label><input type="text" id="nameInput" placeholder="请输入姓名"></div>
                    <div class="form-group"><label>性别 <span class="required">*</span></label><select id="genderSelect"><option value="">请选择</option><option value="男">男</option><option value="女">女</option></select></div>
                </div>
                <div class="form-row"><div class="form-group"><label>出生日期 <span class="required">*</span></label><input type="date" id="dateInput" value=""></div></div>
                <div class="time-option-row">
                    <div class="time-toggle">
                        <label><input type="radio" name="knowTime" value="yes" checked> 我知道出生时间</label>
                        <label><input type="radio" name="knowTime" value="no"> 不清楚出生时间</label>
                    </div>
                    <div id="timeWarning" class="warning-box hidden">⚠️ 未提供准确出生时间，分析准确率约30%-40%，结果仅供参考。</div>
                </div>
                <div id="timeSelectArea">
                    <div class="form-row">
                        <div class="form-group"><label>出生时间</label><select id="hourSelect"><option value="">请选择时辰</option><option value="23">23时 子时</option><option value="0">0时 子时</option><option value="1">1时 丑时</option><option value="2">2时 丑时</option><option value="3">3时 寅时</option><option value="4">4时 寅时</option><option value="5">5时 卯时</option><option value="6">6时 卯时</option><option value="7">7时 辰时</option><option value="8">8时 辰时</option><option value="9">9时 巳时</option><option value="10">10时 巳时</option><option value="11">11时 午时</option><option value="12">12时 午时</option><option value="13">13时 未时</option><option value="14">14时 未时</option><option value="15">15时 申时</option><option value="16">16时 申时</option><option value="17">17时 酉时</option><option value="18">18时 酉时</option><option value="19">19时 戌时</option><option value="20">20时 戌时</option><option value="21">21时 亥时</option><option value="22">22时 亥时</option></select></div>
                        <div class="form-group"><label>分钟</label><select id="minuteSelect"><option value="">请选择分钟</option></select></div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出生地点</label>
                        <div class="location-row">
                            <select id="provinceSelect" class="location-select"><option value="">请选择省份</option></select>
                            <select id="citySelect" class="location-select"><option value="">请选择城市</option></select>
                            <select id="districtSelect" class="location-select"><option value="">请选择区/县</option></select>
                        </div>
                    </div>
                </div>
                <div class="checkbox-row">
                    <label class="checkbox-label"><input type="checkbox" id="useTrueSolar"> 使用真太阳时（需填写出生地点）</label>
                    <label class="checkbox-label"><input type="checkbox" id="useEarlyLate"> 使用早晚子时</label>
                </div>
                <div id="trueSolarResult" class="true-solar-box hidden"></div>
                <div class="module-buttons">
                    <button class="module-btn" data-module="overview">综合</button>
                    <button class="module-btn active" data-module="career">事业</button>
                    <button class="module-btn" data-module="wealth">财运</button>
                    <button class="module-btn" data-module="marriage">婚姻</button>
                    <button class="module-btn" data-module="liunian">流年</button>
                </div>
                <button class="analyze-btn" id="analyzeBtn">开始计算八字</button>
            </div>
            <div class="result-card" id="resultCard" style="display: none;"><div class="result-title">📊 分析结果</div><div class="result-content" id="resultContent"></div></div>
        </div>
    </div>
</div>

<script>
    // ==================== 全国省市区数据 ====================
    const chinaRegions = {
    '北京市': { lon: 116.40, cities: { '北京市': ['东城区','西城区'] } },
    '上海市': { lon: 121.48, cities: { '上海市': ['黄浦区','徐汇区'] } },
    '广东省': { lon: 113.27, cities: { '广州市': ['越秀区','天河区'], '深圳市': ['福田区','南山区'] } },
    '四川省': { lon: 104.06, cities: { '成都市': ['锦江区','青羊区'], '宜宾市': ['翠屏区','南溪区'] } }};

    function initMinuteSelect() {
        const minuteSelect = document.getElementById('minuteSelect');
        minuteSelect.innerHTML = '<option value="">请选择分钟</option>';
        for (let i = 0; i <= 59; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `${i.toString().padStart(2, '0')}分`;
            minuteSelect.appendChild(option);
        }
    }

    function initProvinceSelect() {
        const provinceSelect = document.getElementById('provinceSelect');
        for (const province in chinaRegions) {
            const option = document.createElement('option');
            option.value = province;
            option.textContent = province;
            provinceSelect.appendChild(option);
        }
    }

    function updateCitySelect() {
        const province = document.getElementById('provinceSelect').value;
        const citySelect = document.getElementById('citySelect');
        const districtSelect = document.getElementById('districtSelect');
        citySelect.innerHTML = '<option value="">请选择城市</option>';
        districtSelect.innerHTML = '<option value="">请选择区/县</option>';
        if (province && chinaRegions[province]) {
            const cities = chinaRegions[province].cities;
            for (const city in cities) {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            }
        }
    }

    function updateDistrictSelect() {
        const province = document.getElementById('provinceSelect').value;
        const city = document.getElementById('citySelect').value;
        const districtSelect = document.getElementById('districtSelect');
        districtSelect.innerHTML = '<option value="">请选择区/县</option>';
        if (province && city && chinaRegions[province] && chinaRegions[province].cities[city]) {
            const districts = chinaRegions[province].cities[city];
            for (const district of districts) {
                const option = document.createElement('option');
                option.value = district;
                option.textContent = district;
                districtSelect.appendChild(option);
            }
        }
    }

    function getLocationInfo() {
        const province = document.getElementById('provinceSelect').value;
        const city = document.getElementById('citySelect').value;
        const district = document.getElementById('districtSelect').value;
        if (!province) return null;
        let locationName = province;
        if (city) locationName += city;
        if (district) locationName += district;
        let longitude = chinaRegions[province]?.lon || null;
        return { name: locationName, longitude: longitude };
    }

    const API_URL = 'https://bazi-api-production-0123.up.railway.app';
    let currentModule = 'career';
    let isLoading = false;

    function getDayOfYear(date) {
        const start = new Date(date.getFullYear(), 0, 0);
        const diff = date - start;
        return Math.floor(diff / 86400000);
    }

    function calculateTrueSolarTime(date, hour, minute, longitude) {
        const dayOfYear = getDayOfYear(date);
        const B = (dayOfYear - 1) * 2 * Math.PI / 365;
        let eqTime = 0.258 * Math.cos(B) - 7.416 * Math.sin(B) - 3.648 * Math.cos(2 * B) - 9.228 * Math.sin(2 * B);
        let lonCorrection = (longitude - 120) * 4;
        let offsetMinutes = lonCorrection + eqTime;
        let totalMinutes = hour * 60 + minute + offsetMinutes;
        let newHour = Math.floor(totalMinutes / 60) % 24;
        let newMinute = Math.round(totalMinutes % 60);
        if (newMinute >= 60) { newMinute -= 60; newHour = (newHour + 1) % 24; }
        if (newMinute < 0) { newMinute += 60; newHour = (newHour - 1 + 24) % 24; }
        return { hour: newHour, minute: newMinute };
    }

    function updateTrueSolarDisplay() {
        const useTrueSolar = document.getElementById('useTrueSolar').checked;
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        const trueSolarDiv = document.getElementById('trueSolarResult');
        if (!useTrueSolar || knowTime === 'no') { trueSolarDiv.classList.add('hidden'); return; }
        const locationInfo = getLocationInfo();
        if (!locationInfo || !locationInfo.longitude) {
            trueSolarDiv.classList.remove('hidden');
            trueSolarDiv.innerHTML = '📍 请选择完整的出生地点（省-市-区），以便进行真太阳时校正';
            trueSolarDiv.style.background = '#fff3e0';
            trueSolarDiv.style.borderLeftColor = '#e6b980';
            return;
        }
        const dateStr = document.getElementById('dateInput').value;
        const hour = parseInt(document.getElementById('hourSelect').value);
        const minute = parseInt(document.getElementById('minuteSelect').value);
        if (!dateStr || isNaN(hour) || isNaN(minute)) {
            trueSolarDiv.classList.remove('hidden');
            trueSolarDiv.innerHTML = '⏰ 请先填写完整的出生日期和时间';
            return;
        }
        const date = new Date(dateStr);
        const trueTime = calculateTrueSolarTime(date, hour, minute, locationInfo.longitude);
        const shichenMap = {23:'子',0:'子',1:'丑',2:'丑',3:'寅',4:'寅',5:'卯',6:'卯',7:'辰',8:'辰',9:'巳',10:'巳',11:'午',12:'午',13:'未',14:'未',15:'申',16:'申',17:'酉',18:'酉',19:'戌',20:'戌',21:'亥',22:'亥'};
        const originalShichen = shichenMap[hour] || '';
        const trueShichen = shichenMap[trueTime.hour] || '';
        trueSolarDiv.classList.remove('hidden');
        trueSolarDiv.style.background = '#e8f5e9';
        trueSolarDiv.style.borderLeftColor = '#4caf50';
        trueSolarDiv.innerHTML = `🌞 真太阳时校正结果<br>📍 ${locationInfo.name}（经度 ${locationInfo.longitude}°）<br>🕐 北京时间：${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}（${originalShichen}时）<br>🕐 真太阳时：${trueTime.hour.toString().padStart(2,'0')}:${trueTime.minute.toString().padStart(2,'0')}（${trueShichen}时）<br>⚡ 分析将使用校正后的真太阳时`;
    }

    function getActualBirthTime() {
        const useTrueSolar = document.getElementById('useTrueSolar').checked;
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        if (knowTime === 'no') return null;
        let hour = parseInt(document.getElementById('hourSelect').value);
        let minute = parseInt(document.getElementById('minuteSelect').value);
        if (useTrueSolar) {
            const locationInfo = getLocationInfo();
            const dateStr = document.getElementById('dateInput').value;
            if (locationInfo && locationInfo.longitude && dateStr && !isNaN(hour) && !isNaN(minute)) {
                const date = new Date(dateStr);
                const trueTime = calculateTrueSolarTime(date, hour, minute, locationInfo.longitude);
                return { hour: trueTime.hour, minute: trueTime.minute };
            }
        }
        return { hour: hour, minute: minute };
    }

    function buildBirthString() {
        const date = new Date(document.getElementById('dateInput').value);
        if (isNaN(date.getTime())) return null;
        const year = date.getFullYear(), month = date.getMonth() + 1, day = date.getDate();
        const gender = document.getElementById('genderSelect').value;
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        if (!gender || !dateInput.value) return null;
        if (knowTime === 'yes') {
            const actualTime = getActualBirthTime();
            if (!actualTime || isNaN(actualTime.hour) || isNaN(actualTime.minute)) return null;
            return `${year}.${month}.${day} ${actualTime.hour}时 ${actualTime.minute}分 ${gender}`;
        } else {
            return `${year}.${month}.${day} ${gender}`;
        }
    }

    function validateForm() {
        if (!document.getElementById('genderSelect').value) { alert('请选择性别'); return false; }
        if (!document.getElementById('dateInput').value) { alert('请选择出生日期'); return false; }
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        if (knowTime === 'yes') {
            if (!document.getElementById('hourSelect').value) { alert('请选择出生时间'); return false; }
            if (!document.getElementById('minuteSelect').value) { alert('请选择分钟'); return false; }
        }
        return true;
    }

    function addHistory(birthStr) {
        const historyList = document.getElementById('historyList');
        const li = document.createElement('li');
        li.className = 'history-item';
        li.dataset.birth = birthStr;
        li.textContent = birthStr.length > 30 ? birthStr.substring(0, 30) + '...' : birthStr;
        li.onclick = () => {
            const match = birthStr.match(/(\d{4}\.\d{1,2}\.\d{1,2})\s+(\d{1,2})时\s+(\d+)分\s+([男女])/);
            if (match) {
                const dateParts = match[1].split('.');
                document.getElementById('dateInput').value = `${dateParts[0]}-${dateParts[1].padStart(2,'0')}-${dateParts[2].padStart(2,'0')}`;
                document.getElementById('hourSelect').value = match[2];
                document.getElementById('minuteSelect').value = match[3];
                document.getElementById('genderSelect').value = match[4];
                document.querySelector('input[name="knowTime"][value="yes"]').checked = true;
                document.getElementById('timeSelectArea').classList.remove('hidden');
                document.getElementById('timeWarning').classList.add('hidden');
                updateTrueSolarDisplay();
            } else {
                const simpleMatch = birthStr.match(/(\d{4}\.\d{1,2}\.\d{1,2})\s+([男女])/);
                if (simpleMatch) {
                    const dateParts = simpleMatch[1].split('.');
                    document.getElementById('dateInput').value = `${dateParts[0]}-${dateParts[1].padStart(2,'0')}-${dateParts[2].padStart(2,'0')}`;
                    document.getElementById('genderSelect').value = simpleMatch[2];
                    document.querySelector('input[name="knowTime"][value="no"]').checked = true;
                    document.getElementById('timeSelectArea').classList.add('hidden');
                    document.getElementById('timeWarning').classList.remove('hidden');
                }
            }
        };
        historyList.insertBefore(li, historyList.firstChild);
    }

    function showResult(content) {
        let html = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        document.getElementById('resultContent').innerHTML = html;
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
    }

    function newChat() {
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('resultContent').innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function analyze() {
        if (isLoading) return;
        if (!validateForm()) return;
        const birth = buildBirthString();
        if (!birth) { alert('请完整填写必填信息'); return; }
        isLoading = true;
        const analyzeBtn = document.getElementById('analyzeBtn');
        analyzeBtn.disabled = true;
        analyzeBtn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> 分析中...';
        try {
            const response = await fetch(`${API_URL}/analyze`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ birth: birth, module: currentModule }) });
            const data = await response.json();
            if (data.success) { showResult(data.data.analysis); addHistory(birth); }
            else { showResult(`❌ 分析失败：${data.error || '未知错误'}`); }
        } catch (err) { showResult(`❌ 网络错误：${err.message}。请稍后重试。`); }
        finally { isLoading = false; analyzeBtn.disabled = false; analyzeBtn.innerHTML = '开始计算八字'; }
    }

    // 确保 DOM 加载完成后初始化所有事件
    document.addEventListener('DOMContentLoaded', function() {
        initMinuteSelect();
        initProvinceSelect();
        
        // 绑定时间选项切换事件
        const radios = document.querySelectorAll('input[name="knowTime"]');
        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                const timeSelectArea = document.getElementById('timeSelectArea');
                const timeWarning = document.getElementById('timeWarning');
                if (e.target.value === 'yes') {
                    timeSelectArea.classList.remove('hidden');
                    timeWarning.classList.add('hidden');
                } else {
                    timeSelectArea.classList.add('hidden');
                    timeWarning.classList.remove('hidden');
                    const trueSolarDiv = document.getElementById('trueSolarResult');
                    if (trueSolarDiv) trueSolarDiv.classList.add('hidden');
                }
                if (document.getElementById('useTrueSolar').checked) {
                    updateTrueSolarDisplay();
                }
            });
        });
        
        // 绑定其他事件
        document.getElementById('useTrueSolar').addEventListener('change', updateTrueSolarDisplay);
        document.getElementById('provinceSelect').addEventListener('change', () => { updateCitySelect(); updateTrueSolarDisplay(); });
        document.getElementById('citySelect').addEventListener('change', () => { updateDistrictSelect(); updateTrueSolarDisplay(); });
        document.getElementById('districtSelect').addEventListener('change', updateTrueSolarDisplay);
        document.getElementById('dateInput').addEventListener('change', updateTrueSolarDisplay);
        document.getElementById('hourSelect').addEventListener('change', updateTrueSolarDisplay);
        document.getElementById('minuteSelect').addEventListener('change', updateTrueSolarDisplay);
        
        // 模块切换
        document.querySelectorAll('.module-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentModule = btn.dataset.module;
            });
        });
        
        // 按钮事件
        document.getElementById('analyzeBtn').addEventListener('click', analyze);
        document.getElementById('newChatBtn').addEventListener('click', newChat);
    });
</script>
</body>
</html>
