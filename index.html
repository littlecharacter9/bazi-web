<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>八字命理助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f7f7f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #2c2c2e;
            line-height: 1.5;
        }

        /* 容器 - 类似聊天窗口 */
        .app {
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 头部 */
        .header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid #e9e9ef;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 4px;
        }

        /* 对话区域 */
        .chat-area {
            flex: 1;
            padding: 16px 20px;
        }

        /* 用户消息 - 右对齐 */
        .message-user {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }
        .message-user .bubble {
            background-color: #e9e9ef;
            color: #1c1c1e;
            padding: 12px 16px;
            border-radius: 20px;
            border-bottom-right-radius: 4px;
            max-width: 85%;
            font-size: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* AI 消息 - 左对齐 */
        .message-ai {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 24px;
        }
        .message-ai .avatar {
            width: 32px;
            height: 32px;
            background: #1a1a2e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .message-ai .avatar span {
            color: white;
            font-size: 14px;
            font-weight: 500;
        }
        .message-ai .bubble {
            background-color: #fff;
            border: 1px solid #e9e9ef;
            padding: 12px 16px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            max-width: 85%;
            font-size: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        /* 输入区域 - 固定在底部 */
        .input-area {
            border-top: 1px solid #e9e9ef;
            padding: 16px 20px 20px;
            background: #fff;
        }

        /* 模块按钮行 */
        .module-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .module-btn {
            padding: 8px 20px;
            background: #fff;
            border: 1px solid #e9e9ef;
            border-radius: 30px;
            font-size: 14px;
            color: #5e5e66;
            cursor: pointer;
            transition: all 0.2s;
        }
        .module-btn.active {
            background: #1a1a2e;
            border-color: #1a1a2e;
            color: #fff;
        }

        /* 输入框行 */
        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-row input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e9e9ef;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }
        .input-row input:focus {
            border-color: #1a1a2e;
        }
        .input-row button {
            padding: 12px 24px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .input-row button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 加载状态 */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #8e8e93;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* 结果中的样式 */
        .bubble h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 12px 0 8px;
            color: #1a1a2e;
        }
        .bubble h3:first-child {
            margin-top: 0;
        }
        .bubble p {
            margin: 8px 0;
        }
        .bubble hr {
            margin: 12px 0;
            border: none;
            border-top: 1px solid #e9e9ef;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            color: #8e8e93;
            padding: 60px 20px;
            font-size: 14px;
        }

        /* 底部提示 */
        .footer-tip {
            text-align: center;
            font-size: 11px;
            color: #b0b0b6;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>八字命理助手</h1>
        <p>子平八字 · AI 辅助分析</p>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
            👋 输入生辰开始分析<br>
            例如：2001.10.30 18时 男
        </div>
    </div>

    <div class="input-area">
        <div class="module-row">
            <button class="module-btn" data-module="overview">综合</button>
            <button class="module-btn active" data-module="career">事业</button>
            <button class="module-btn" data-module="wealth">财运</button>
            <button class="module-btn" data-module="marriage">婚姻</button>
            <button class="module-btn" data-module="liunian">流年</button>
        </div>
        <div class="input-row">
            <input type="text" id="birthInput" placeholder="输入生辰，如 2001.10.30 18时 男" value="2001.10.30 18时 男">
            <button id="sendBtn">发送</button>
        </div>
        <div class="footer-tip">以上内容由AI生成，仅供参考</div>
    </div>
</div>

<script>
    const API_URL = 'https://bazi-api-production-0123.up.railway.app';
    let currentModule = 'career';
    let isLoading = false;

    // DOM 元素
    const chatArea = document.getElementById('chatArea');
    const emptyState = document.getElementById('emptyState');
    const birthInput = document.getElementById('birthInput');
    const sendBtn = document.getElementById('sendBtn');

    // 模块切换
    document.querySelectorAll('.module-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentModule = btn.dataset.module;
        });
    });

    // 添加用户消息
    function addUserMessage(text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message-user';
        messageDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        chatArea.appendChild(messageDiv);
        scrollToBottom();
    }

    // 添加 AI 消息（带加载状态）
    function addAIMessage() {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message-ai';
        messageDiv.id = 'lastAIMessage';
        messageDiv.innerHTML = `
            <div class="avatar"><span>八</span></div>
            <div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>
        `;
        chatArea.appendChild(messageDiv);
        scrollToBottom();
        return messageDiv.querySelector('.bubble');
    }

    // 更新 AI 消息内容
    function updateAIMessage(content) {
        const msgDiv = document.getElementById('lastAIMessage');
        if (msgDiv) {
            const bubble = msgDiv.querySelector('.bubble');
            bubble.innerHTML = formatContent(content);
        }
        scrollToBottom();
    }

    // 格式化内容（支持简单 Markdown）
    function formatContent(text) {
        if (!text) return '暂无内容';
        // 换行转 br
        let html = text.replace(/\n/g, '<br>');
        // 加粗
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // 标题
        html = html.replace(/^## (.*?)$/gm, '<h3>$1</h3>');
        html = html.replace(/^### (.*?)$/gm, '<h4>$1</h4>');
        return html;
    }

    // 转义 HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 滚动到底部
    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // 隐藏空状态
    function hideEmptyState() {
        if (emptyState) emptyState.style.display = 'none';
    }

    // 发送分析请求
    async function sendRequest() {
        if (isLoading) return;

        const birth = birthInput.value.trim();
        if (!birth) {
            alert('请输入出生信息');
            return;
        }

        isLoading = true;
        sendBtn.disabled = true;
        sendBtn.textContent = '分析中...';
        hideEmptyState();

        // 添加用户消息
        addUserMessage(`${birth} 【${getModuleName(currentModule)}】`);

        // 添加 AI 占位消息
        addAIMessage();

        const startTime = Date.now();
        console.log(`[请求开始] ${new Date().toISOString()} - 生辰: ${birth}, 模块: ${currentModule}`);

        try {
            const response = await fetch(`${API_URL}/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ birth: birth, module: currentModule })
            });
            const data = await response.json();

            const duration = Date.now() - startTime;
            console.log(`[请求成功] ${new Date().toISOString()} - 耗时: ${duration}ms`);

            if (data.success) {
                updateAIMessage(data.data.analysis);
            } else {
                updateAIMessage(`❌ 分析失败：${data.error || '未知错误'}`);
            }

            // 可选：同时请求验证接口，作为第二条消息
            try {
                const verifyRes = await fetch(`${API_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ birth: birth })
                });
                const verifyData = await verifyRes.json();
                if (verifyData.success && verifyData.data.verify) {
                    // 添加第二条验证消息
                    const verifyMsgDiv = document.createElement('div');
                    verifyMsgDiv.className = 'message-ai';
                    verifyMsgDiv.innerHTML = `
                        <div class="avatar"><span>验</span></div>
                        <div class="bubble">📋 <strong>八字验证</strong><br><br>${escapeHtml(verifyData.data.verify).replace(/\n/g, '<br>')}</div>
                    `;
                    chatArea.appendChild(verifyMsgDiv);
                    scrollToBottom();
                }
            } catch (err) {
                console.log('验证接口调用失败', err);
            }

        } catch (err) {
            console.error(`[请求失败] ${err}`);
            updateAIMessage(`❌ 网络错误：${err.message}`);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            sendBtn.textContent = '发送';
            console.log(`[请求结束] ${new Date().toISOString()}`);
        }
    }

    function getModuleName(module) {
        const map = {
            overview: '综合',
            career: '事业',
            wealth: '财运',
            marriage: '婚姻',
            liunian: '流年'
        };
        return map[module] || module;
    }

    // 绑定发送事件
    sendBtn.addEventListener('click', sendRequest);
    birthInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendRequest();
    });

    // 页面加载时自动发送一次示例（可选）
    // setTimeout(() => sendRequest(), 500);
</script>
</body>
</html>
