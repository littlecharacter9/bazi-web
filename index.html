<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>八戒命理 - 八字命理助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f7; color: #1c1c1e; height: 100vh; overflow: hidden; }
        .app { display: flex; height: 100vh; width: 100%; }
        .sidebar { width: 280px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .logo-area { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #e6b980 0%, #e6b980 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-sub { font-size: 12px; color: #888; margin-top: 6px; }
        .new-chat-btn { margin: 20px; padding: 12px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .new-chat-btn:hover { background: rgba(255,255,255,0.15); }
        .history-section { flex: 1; padding: 0 12px; display: flex; flex-direction: column; min-height: 0; }
        .history-title { font-size: 12px; color: #888; padding: 12px 12px 8px; letter-spacing: 0.5px; }
        .history-list { list-style: none; overflow-y: auto; max-height: 400px; }
        .history-item { padding: 10px 12px; border-radius: 10px; margin-bottom: 4px; cursor: pointer; font-size: 13px; color: #ccc; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .history-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
        .history-empty { padding: 12px; color: #888; text-align: center; font-size: 12px; }
        .history-icon { opacity: 0.5; transition: opacity 0.2s; cursor: pointer; }
        .history-item:hover .history-icon { opacity: 1; }
        .history-icon:hover { color: #e6b980 !important; }
        .user-section { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; background: #e6b980; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #1a1a2e; }
        .user-name { font-size: 14px; font-weight: 500; color: white; }
        .user-email { font-size: 11px; color: #888; }
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #fff; }
        .main-header { padding: 20px 30px; border-bottom: 1px solid #eee; background: #fff; }
        .main-header h2 { font-size: 22px; font-weight: 600; color: #1a1a2e; }
        .main-header p { font-size: 13px; color: #888; margin-top: 4px; }
        .content-area { flex: 1; padding: 24px 30px; overflow-y: auto; }
        .form-card { background: #f9f9fb; border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 150px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #333; margin-bottom: 8px; }
        .form-group label .required { color: #e74c3c; margin-left: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 14px; outline: none; background: #fff; }
        .form-group input:focus, .form-group select:focus { border-color: #e6b980; }
        input[type="date"] { min-height: 46px; }
        .time-option-row { margin-bottom: 16px; }
        .time-toggle { display: flex; gap: 20px; margin-bottom: 16px; }
        .time-toggle label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: #333; }
        .time-toggle input { width: 18px; height: 18px; cursor: pointer; }
        .warning-box { background: #fff3e0; border-left: 4px solid #e6b980; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 13px; color: #b86b00; }
        .true-solar-box { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 13px; color: #2e7d32; }
        .verify-box { background: #e8f0fe; border-left: 4px solid #1a1a2e; padding: 16px; border-radius: 12px; margin-bottom: 16px; }
        .verify-item { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #e0e0e0; }
        .verify-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .verify-title { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
        .verify-question { font-size: 13px; color: #666; margin-bottom: 8px; font-style: italic; }
        .item-buttons { display: flex; gap: 16px; margin-bottom: 10px; }
        .item-btn { padding: 4px 12px; border: none; border-radius: 16px; font-size: 12px; cursor: pointer; background: #f0f0f0; color: #666; transition: all 0.2s; }
        .item-btn.confirm.active { background: #1a1a2e; color: white; }
        .item-btn.feedback.active { background: #e6b980; color: #1a1a2e; }
        .verify-content { font-size: 14px; line-height: 1.7; color: #333; white-space: pre-wrap; margin-bottom: 8px; }
        .feedback-detail { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 12px; font-size: 13px; margin-top: 12px; display: none; resize: vertical; font-family: inherit; }
        .feedback-detail.active { display: block; }
        .bazi-info { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 14px; }
        .bazi-info span { font-weight: 600; color: #1a1a2e; }
        .checkbox-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #333; cursor: pointer; }
        .module-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .module-btn { padding: 8px 20px; background: #f0f0f0; border: none; border-radius: 30px; font-size: 14px; color: #666; cursor: pointer; }
        .module-btn.active { background: #1a1a2e; color: white; }
        .result-card { background: #f9f9fb; border-radius: 20px; padding: 24px; margin-bottom: 16px; }
        .result-title { font-size: 16px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
        .result-content { font-size: 14px; line-height: 1.7; color: #333; white-space: pre-wrap; max-height: 500px; overflow-y: auto; }
        .action-icons { display: flex; gap: 16px; justify-content: flex-end; margin-top: 16px; padding-top: 12px; border-top: 1px solid #eee; }
        .action-icon { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #666; cursor: pointer; transition: color 0.2s; }
        .action-icon:hover { color: #e6b980; }
        .loading-dots { display: inline-flex; gap: 4px; }
        .loading-dots span { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: dotPulse 1.4s infinite ease-in-out; }
        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%, 60%, 100% { transform: scale(1); opacity: 0.3; } 30% { transform: scale(1.2); opacity: 1; } }
        .location-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .location-select { flex: 1; min-width: 100px; }
        .hidden { display: none !important; }
        .loading-text { color: #666; font-size: 12px; margin-top: 8px; }
        .action-buttons { margin-top: 16px; padding-top: 16px; border-top: 1px solid #e0e0e0; display: flex; gap: 16px; justify-content: flex-end; }
        .action-btn { padding: 8px 20px; border: none; border-radius: 24px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .action-btn.primary { background: #e6b980; color: #1a1a2e; }
        .action-btn.dark { background: #1a1a2e; color: white; }
        .action-btn.secondary { background: #e0e0e0; color: #999; cursor: not-allowed; }
        .feedback-notice { background: #e8f5e9; padding: 12px; border-radius: 12px; margin-bottom: 16px; font-size: 13px; color: #2e7d32; }
        .analysis-buttons { display: flex; gap: 16px; margin-top: 20px; }
        .analysis-buttons button { flex: 1; }
        .btn-start { width: 100%; padding: 14px; background: #e6b980; color: #1a1a2e; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-done { width: 100%; padding: 14px; background: #e0e0e0; color: #999; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: not-allowed; }
        .btn-continue { width: 100%; padding: 14px; background: #e6b980; color: #1a1a2e; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .verify-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 8px 0; }
        .verify-header:hover { background: rgba(0,0,0,0.02); }
        .verify-title-icon { font-size: 15px; font-weight: 600; color: #1a1a2e; }
        .verify-toggle-icon { font-size: 16px; color: #666; transition: transform 0.2s; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo-area"><div class="logo">八戒命理</div><div class="logo-sub">AI解析 · 仅供参考</div></div>
        <div class="new-chat-btn" id="newChatBtn">+ 新对话</div>
        <div class="history-section">
            <div class="history-title">最近对话</div>
            <ul class="history-list" id="historyList"></ul>
        </div>
        <div class="user-section"><div class="user-info"><div class="user-avatar">八</div><div><div class="user-name">游客模式</div><div class="user-email">登录功能开发中</div></div></div></div>
    </div>
    <div class="main">
        <div class="main-header"><h2>八字命盘分析</h2><p>输入生辰信息，AI 辅助解析命盘格局</p></div>
        <div class="content-area">
            <div class="form-card">
                <div class="form-row">
                    <div class="form-group"><label>姓名 (选填)</label><input type="text" id="nameInput" placeholder="请输入姓名"></div>
                    <div class="form-group"><label>性别 <span class="required">*</span></label><select id="genderSelect"><option value="">请选择</option><option value="男">男</option><option value="女">女</option></select></div>
                </div>
                <div class="form-row"><div class="form-group"><label>出生日期 <span class="required">*</span></label><input type="date" id="dateInput" value=""></div></div>
                <div class="time-option-row">
                    <div class="time-toggle">
                        <label><input type="radio" name="knowTime" value="yes" checked> 我知道出生时间</label>
                        <label><input type="radio" name="knowTime" value="no"> 不清楚出生时间</label>
                    </div>
                    <div id="timeWarning" class="warning-box hidden">⚠️ 未提供准确出生时间，分析准确率约30%-40%，结果仅供参考。</div>
                </div>
                <div id="timeSelectArea">
                    <div class="form-row">
                        <div class="form-group"><label>出生时间</label><select id="hourSelect"><option value="">请选择时辰</option><option value="23">23时 子时</option><option value="0">0时 子时</option><option value="1">1时 丑时</option><option value="2">2时 丑时</option><option value="3">3时 寅时</option><option value="4">4时 寅时</option><option value="5">5时 卯时</option><option value="6">6时 卯时</option><option value="7">7时 辰时</option><option value="8">8时 辰时</option><option value="9">9时 巳时</option><option value="10">10时 巳时</option><option value="11">11时 午时</option><option value="12">12时 午时</option><option value="13">13时 未时</option><option value="14">14时 未时</option><option value="15">15时 申时</option><option value="16">16时 申时</option><option value="17">17时 酉时</option><option value="18">18时 酉时</option><option value="19">19时 戌时</option><option value="20">20时 戌时</option><option value="21">21时 亥时</option><option value="22">22时 亥时</option></select></div>
                        <div class="form-group"><label>分钟</label><select id="minuteSelect"><option value="">请选择分钟</option></select></div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出生地点</label>
                        <div class="location-row">
                            <select id="provinceSelect" class="location-select"><option value="">请选择省份</option></select>
                            <select id="citySelect" class="location-select"><option value="">请选择城市</option></select>
                            <select id="districtSelect" class="location-select"><option value="">请选择区/县</option></select>
                        </div>
                        <div id="regionLoading" class="loading-text hidden">正在加载省市区数据...</div>
                    </div>
                </div>
                <div class="checkbox-row">
                    <label class="checkbox-label"><input type="checkbox" id="useTrueSolar"> 使用真太阳时（需填写出生地点）</label>
                    <label class="checkbox-label"><input type="checkbox" id="useEarlyLate"> 使用早晚子时</label>
                </div>
                <div id="trueSolarResult" class="true-solar-box hidden"></div>
                
                <div id="baziInfoArea" class="bazi-info hidden">八字排盘：<span id="baziDisplay"></span></div>
                
                <!-- 验证区域（可折叠） -->
                <div id="verifyArea" class="hidden">
                    <div class="verify-box" id="verifyBox">
                        <div class="verify-header" id="verifyHeader">
                            <span class="verify-title-icon">📋 八字验证推断</span>
                            <span class="verify-toggle-icon" id="verifyToggleIcon">▼</span>
                        </div>
                        <div id="verifyContentWrapper">
                            <div id="verifyItemsContainer"></div>
                            <div class="action-buttons" id="actionButtons" style="display: none;">
                                <button class="action-btn secondary" id="submitFeedbackBtn">提交不准确反馈</button>
                                <button class="action-btn dark" id="confirmOverallBtn">全部/大部分准确，继续分析</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="moduleArea" class="hidden">
                    <div class="module-buttons">
                        <button class="module-btn" data-module="overview">综合</button>
                        <button class="module-btn active" data-module="career">事业</button>
                        <button class="module-btn" data-module="wealth">财运</button>
                        <button class="module-btn" data-module="marriage">婚姻</button>
                        <button class="module-btn" data-module="liunian">流年</button>
                    </div>
                    <div id="analysisBtnContainer" class="analysis-buttons">
                        <button class="btn-start" id="startAnalysisBtn">开始深度分析</button>
                    </div>
                </div>
                
                <button class="btn-start" id="startVerifyBtn">开始验证八字</button>
            </div>
            
            <div id="resultCard" class="result-card" style="display: none;">
                <div class="result-title">分析结果</div>
                <div class="result-content" id="resultContent"></div>
                <div class="action-icons">
                    <div class="action-icon" id="copyResultBtn">📋 复制</div>
                    <div class="action-icon" id="regenerateResultBtn">🔄 重新生成</div>
                    <div class="action-icon" id="shareResultBtn">📤 转发</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://bazi-api-production-0123.up.railway.app';
    let currentModule = 'career';
    let isLoading = false;
    let pcaData = null;
    
    let currentStep = 0;
    let currentBirth = '';
    let currentBaziStr = '';
    let currentVerifyItems = [];
    let itemFeedbacks = [];
    let lastAnalysisResult = '';

    // ==================== 折叠功能 ====================
    function toggleVerifySection() {
        const wrapper = document.getElementById('verifyContentWrapper');
        const icon = document.getElementById('verifyToggleIcon');
        if (wrapper.style.display === 'none') {
            wrapper.style.display = 'block';
            icon.textContent = '▼';
        } else {
            wrapper.style.display = 'none';
            icon.textContent = '▶';
        }
    }

    // ==================== 本地存储管理 ====================
    const STORAGE_KEY = 'bazi_analysis_history';

    function saveAnalysisRecord(birthStr, moduleName, resultContent, baziStr, userName) {
        const records = getAnalysisRecords();
        const displayName = userName && userName.trim() ? `${userName.trim()} · ${moduleName}` : `匿名 · ${moduleName}`;
        const newRecord = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            date: new Date().toLocaleString('zh-CN'),
            birth: birthStr,
            module: moduleName,
            bazi: baziStr || '',
            result: resultContent,
            name: displayName,
            userName: userName || ''
        };
        records.unshift(newRecord);
        if (records.length > 30) records.pop();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        updateHistoryList();
    }

    function getAnalysisRecords() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (!data) return [];
        try {
            return JSON.parse(data);
        } catch (e) {
            return [];
        }
    }

    function deleteAnalysisRecord(id) {
        let records = getAnalysisRecords();
        records = records.filter(r => r.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        updateHistoryList();
    }

    function renameAnalysisRecord(id) {
        const records = getAnalysisRecords();
        const record = records.find(r => r.id === id);
        if (!record) return;
        const currentName = record.userName || '匿名';
        const newName = prompt('重命名', currentName);
        if (newName && newName.trim()) {
            record.userName = newName.trim();
            record.name = `${newName.trim()} · ${record.module}`;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            updateHistoryList();
        }
    }

    function clearAllHistory() {
        if (confirm('确定要清空所有历史记录吗？')) {
            localStorage.removeItem(STORAGE_KEY);
            updateHistoryList();
        }
    }

    function updateHistoryList() {
        const historyList = document.getElementById('historyList');
        if (!historyList) return;
        
        const records = getAnalysisRecords();
        if (records.length === 0) {
            historyList.innerHTML = '<li class="history-empty">暂无历史记录</li>';
            return;
        }
        
        historyList.innerHTML = '';
        records.forEach(record => {
            const li = document.createElement('li');
            li.className = 'history-item';
            const displayName = record.name || `${record.userName || '匿名'} · ${record.module}`;
            li.innerHTML = `
                <span style="flex:1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px;">${displayName}</span>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <span class="history-icon history-rename" data-id="${record.id}" style="cursor: pointer; color: #888; font-size: 12px;">✎</span>
                    <span class="history-icon history-delete" data-id="${record.id}" style="cursor: pointer; color: #888; font-size: 14px;">🗑</span>
                </div>
            `;
            li.onclick = (e) => {
                if (e.target.classList.contains('history-icon')) return;
                viewHistoryRecord(record);
            };
            historyList.appendChild(li);
        });
        
        document.querySelectorAll('.history-delete').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                deleteAnalysisRecord(id);
            };
        });
        
        document.querySelectorAll('.history-rename').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                renameAnalysisRecord(id);
            };
        });
        
        const clearBtn = document.createElement('li');
        clearBtn.className = 'history-item';
        clearBtn.style.borderTop = '1px solid rgba(255,255,255,0.1)';
        clearBtn.style.marginTop = '8px';
        clearBtn.style.justifyContent = 'center';
        clearBtn.innerHTML = '<span style="color: #e6b980;">清空所有记录</span>';
        clearBtn.onclick = (e) => {
            e.stopPropagation();
            clearAllHistory();
        };
        historyList.appendChild(clearBtn);
    }

    function viewHistoryRecord(record) {
        // 显示分析结果
        document.getElementById('resultContent').innerHTML = record.result.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        document.getElementById('resultCard').style.display = 'block';
        
        // 显示八字信息
        if (record.bazi) {
            document.getElementById('baziDisplay').textContent = record.bazi;
            document.getElementById('baziInfoArea').classList.remove('hidden');
        }
        
        // 自动填充用户信息
        if (record.birth) {
            const birthMatch = record.birth.match(/(\d{4})\.(\d{1,2})\.(\d{1,2})\s+(\d{1,2})时\s+(\d+)分\s+([男女])/);
            if (birthMatch) {
                const year = birthMatch[1];
                const month = birthMatch[2].padStart(2, '0');
                const day = birthMatch[3].padStart(2, '0');
                const hour = birthMatch[4];
                const minute = birthMatch[5];
                const gender = birthMatch[6];
                
                document.getElementById('dateInput').value = `${year}-${month}-${day}`;
                document.getElementById('hourSelect').value = hour;
                document.getElementById('minuteSelect').value = minute;
                document.getElementById('genderSelect').value = gender;
                document.querySelector('input[name="knowTime"][value="yes"]').checked = true;
                document.getElementById('timeSelectArea').classList.remove('hidden');
                document.getElementById('timeWarning').classList.add('hidden');
            } else {
                const simpleMatch = record.birth.match(/(\d{4})\.(\d{1,2})\.(\d{1,2})\s+([男女])/);
                if (simpleMatch) {
                    const year = simpleMatch[1];
                    const month = simpleMatch[2].padStart(2, '0');
                    const day = simpleMatch[3].padStart(2, '0');
                    const gender = simpleMatch[4];
                    
                    document.getElementById('dateInput').value = `${year}-${month}-${day}`;
                    document.getElementById('genderSelect').value = gender;
                    document.querySelector('input[name="knowTime"][value="no"]').checked = true;
                    document.getElementById('timeSelectArea').classList.add('hidden');
                    document.getElementById('timeWarning').classList.remove('hidden');
                }
            }
            
            if (record.userName) {
                document.getElementById('nameInput').value = record.userName;
            }
        }
        
        currentBirth = record.birth;
        currentBaziStr = record.bazi;
        
        document.getElementById('moduleArea').classList.remove('hidden');
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
        lastAnalysisResult = record.result;
    }

    function currentModuleName() {

    function getDayOfYear(date) {
        const start = new Date(date.getFullYear(), 0, 0);
        return Math.floor((date - start) / 86400000);
    }

    function calculateTrueSolarTime(date, hour, minute, longitude) {
        const dayOfYear = getDayOfYear(date);
        const B = (dayOfYear - 1) * 2 * Math.PI / 365;
        let eqTime = 0.258 * Math.cos(B) - 7.416 * Math.sin(B) - 3.648 * Math.cos(2 * B) - 9.228 * Math.sin(2 * B);
        let lonCorrection = (longitude - 120) * 4;
        let totalMinutes = hour * 60 + minute + lonCorrection + eqTime;
        let newHour = Math.floor(totalMinutes / 60) % 24;
        let newMinute = Math.round(totalMinutes % 60);
        if (newMinute >= 60) { newMinute -= 60; newHour = (newHour + 1) % 24; }
        if (newMinute < 0) { newMinute += 60; newHour = (newHour - 1 + 24) % 24; }
        return { hour: newHour, minute: newMinute };
    }

    function updateTrueSolarDisplay() {
        const useTrueSolar = document.getElementById('useTrueSolar').checked;
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        const trueSolarDiv = document.getElementById('trueSolarResult');
        if (!useTrueSolar || knowTime === 'no') { trueSolarDiv.classList.add('hidden'); return; }
        const locationInfo = getLocationInfo();
        if (!locationInfo || !locationInfo.longitude) {
            trueSolarDiv.classList.remove('hidden');
            trueSolarDiv.innerHTML = '📍 请选择完整的出生地点，以便进行真太阳时校正';
            return;
        }
        const dateStr = document.getElementById('dateInput').value;
        const hour = parseInt(document.getElementById('hourSelect').value);
        const minute = parseInt(document.getElementById('minuteSelect').value);
        if (!dateStr || isNaN(hour) || isNaN(minute)) {
            trueSolarDiv.classList.remove('hidden');
            trueSolarDiv.innerHTML = '⏰ 请先填写完整的出生日期和时间';
            return;
        }
        const date = new Date(dateStr);
        const trueTime = calculateTrueSolarTime(date, hour, minute, locationInfo.longitude);
        const shichenMap = {23:'子',0:'子',1:'丑',2:'丑',3:'寅',4:'寅',5:'卯',6:'卯',7:'辰',8:'辰',9:'巳',10:'巳',11:'午',12:'午',13:'未',14:'未',15:'申',16:'申',17:'酉',18:'酉',19:'戌',20:'戌',21:'亥',22:'亥'};
        const originalShichen = shichenMap[hour] || '';
        const trueShichen = shichenMap[trueTime.hour] || '';
        trueSolarDiv.classList.remove('hidden');
        trueSolarDiv.innerHTML = `🌞 真太阳时校正<br>北京时间：${hour}:${minute}（${originalShichen}时）→ 真太阳时：${trueTime.hour}:${trueTime.minute}（${trueShichen}时）`;
    }

    function getActualBirthTime() {
        const useTrueSolar = document.getElementById('useTrueSolar').checked;
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        if (knowTime === 'no') return null;
        let hour = parseInt(document.getElementById('hourSelect').value);
        let minute = parseInt(document.getElementById('minuteSelect').value);
        if (useTrueSolar) {
            const locationInfo = getLocationInfo();
            const dateStr = document.getElementById('dateInput').value;
            if (locationInfo && locationInfo.longitude && dateStr && !isNaN(hour) && !isNaN(minute)) {
                const date = new Date(dateStr);
                const trueTime = calculateTrueSolarTime(date, hour, minute, locationInfo.longitude);
                return { hour: trueTime.hour, minute: trueTime.minute };
            }
        }
        return { hour: hour, minute: minute };
    }

    function buildBirthString() {
        const date = new Date(document.getElementById('dateInput').value);
        if (isNaN(date.getTime())) return null;
        const year = date.getFullYear(), month = date.getMonth() + 1, day = date.getDate();
        const gender = document.getElementById('genderSelect').value;
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        if (!gender) return null;
        if (knowTime === 'yes') {
            const actualTime = getActualBirthTime();
            if (!actualTime || isNaN(actualTime.hour) || isNaN(actualTime.minute)) return null;
            return `${year}.${month}.${day} ${actualTime.hour}时 ${actualTime.minute}分 ${gender}`;
        } else {
            return `${year}.${month}.${day} ${gender}`;
        }
    }

    function parseVerifyContent(content) {
        const items = [];
        const sections = ['【环境方位】', '【六亲情况】', '【过去经历】', '【性格特征】'];
        for (let i = 0; i < sections.length; i++) {
            const start = content.indexOf(sections[i]);
            const end = (i < sections.length - 1) ? content.indexOf(sections[i + 1]) : content.length;
            if (start !== -1) {
                let sectionContent = content.substring(start + sections[i].length, end).trim();
                items.push({ title: sections[i], content: sectionContent });
            }
        }
        return items;
    }

    async function callVerify() {
        const birth = buildBirthString();
        if (!birth) { alert('请完整填写必填信息'); return false; }
        isLoading = true;
        const verifyArea = document.getElementById('verifyArea');
        const verifyItemsContainer = document.getElementById('verifyItemsContainer');

        verifyItemsContainer.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div> 正在分析中...';
        try {
            const response = await fetch(`${API_URL}/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ birth: birth })
            });
            const data = await response.json();
            if (data.success) {
                currentBirth = birth;

                currentVerifyItems = parseVerifyContent(data.data.verify);
                itemFeedbacks = currentVerifyItems.map(() => '');

            }
        } catch (err) {
            verifyItemsContainer.innerHTML = `网络错误：${err.message}`;
        } finally {
            isLoading = false;
        }
        return true;
    }

    async function submitFeedback() {
        const feedbackList = [];
        for (let i = 0; i < currentVerifyItems.length; i++) {
            if (itemFeedbacks[i] && itemFeedbacks[i].trim() !== '') {
                feedbackList.push({
                    section: currentVerifyItems[i].title,
                    content: currentVerifyItems[i].content,
                    feedback: itemFeedbacks[i]
                });
            }
        }
        if (feedbackList.length === 0) {
            alert('请先在不准确的条目中填写反馈内容');
            return;
        }
        const verifyItemsContainer = document.getElementById('verifyItemsContainer');
        verifyItemsContainer.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div> 根据您的反馈重新分析...';
        try {
            const response = await fetch(`${API_URL}/verify_adjust`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ birth: currentBirth, feedback_items: feedbackList })
            });
            const data = await response.json();
            if (data.success && data.data.adjusted_items) {
                for (let adj of data.data.adjusted_items) {
                    for (let i = 0; i < currentVerifyItems.length; i++) {
                        if (currentVerifyItems[i].title === adj.section) {
                            currentVerifyItems[i].content = adj.new_content;
                            break;
                        }
                    }
                }
                for (let i = 0; i < currentVerifyItems.length; i++) itemFeedbacks[i] = '';
                let notice = `📝 感谢您的反馈！已根据您提供的信息重新调整了 ${feedbackList.length} 项推断：<br>`;
                for (let fb of feedbackList) notice += `• ${fb.section}：已根据「${fb.feedback.substring(0, 40)}${fb.feedback.length > 40 ? '...' : ''}」进行调整<br>`;
                displayVerifyItems(currentVerifyItems, notice);
                for (let i = 0; i < currentVerifyItems.length; i++) {
                    const confirmBtn = document.querySelector(`.item-btn.confirm[data-index="${i}"]`);
                    const feedbackBtn = document.querySelector(`.item-btn.feedback[data-index="${i}"]`);
                    const textarea = document.getElementById(`feedback-${i}`);
                    if (confirmBtn) {
                        confirmBtn.onclick = () => {
                            confirmBtn.classList.add('active');
                            feedbackBtn.classList.remove('active');
                            itemFeedbacks[i] = '';
                            textarea.classList.remove('active');
                            textarea.value = '';
                            updateButtonHighlights();
                        };
                    }
                    if (feedbackBtn) {
                        feedbackBtn.onclick = () => {
                            textarea.classList.toggle('active');
                            if (textarea.classList.contains('active')) {
                                feedbackBtn.classList.add('active');
                                confirmBtn.classList.remove('active');
                            } else {
                                feedbackBtn.classList.remove('active');
                                itemFeedbacks[i] = '';
                            }
                        };
                    }
                    if (textarea) {
                        textarea.oninput = () => {
                            itemFeedbacks[i] = textarea.value;
                            if (itemFeedbacks[i].trim() !== '') {
                                feedbackBtn.classList.add('active');
                                confirmBtn.classList.remove('active');
                            } else {
                                feedbackBtn.classList.remove('active');
                            }
                            updateButtonHighlights();
                        };
                    }
                }
                updateButtonHighlights();
            } else {
                verifyItemsContainer.innerHTML = `重新分析失败：${data.error || '未知错误'}`;
            }
        } catch (err) {
            verifyItemsContainer.innerHTML = `网络错误：${err.message}`;
        }

        document.getElementById('confirmOverallBtn').onclick = confirmAllAccurate;
        document.getElementById('startAnalysisBtn').onclick = startAnalysis;
        document.getElementById('copyResultBtn').onclick = copyResult;
        document.getElementById('regenerateResultBtn').onclick = regenerateAnalysis;
        document.getElementById('shareResultBtn').onclick = shareResult;
        document.getElementById('newChatBtn').onclick = newChat;
        
        document.getElementById('provinceSelect').addEventListener('change', () => { updateCitySelect(); if (document.getElementById('useTrueSolar').checked) updateTrueSolarDisplay(); });
        document.getElementById('citySelect').addEventListener('change', () => { updateDistrictSelect(); if (document.getElementById('useTrueSolar').checked) updateTrueSolarDisplay(); });
        document.getElementById('districtSelect').addEventListener('change', () => { if (document.getElementById('useTrueSolar').checked) updateTrueSolarDisplay(); });
        document.getElementById('useTrueSolar').addEventListener('change', updateTrueSolarDisplay);
        document.getElementById('dateInput').addEventListener('change', () => { if (document.getElementById('useTrueSolar').checked) updateTrueSolarDisplay(); });
        document.getElementById('hourSelect').addEventListener('change', () => { if (document.getElementById('useTrueSolar').checked) updateTrueSolarDisplay(); });
        document.getElementById('minuteSelect').addEventListener('change', () => { if (document.getElementById('useTrueSolar').checked) updateTrueSolarDisplay(); });
        
        document.querySelectorAll('input[name="knowTime"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const timeSelectArea = document.getElementById('timeSelectArea');
                const timeWarning = document.getElementById('timeWarning');
                if (e.target.value === 'yes') {
                    timeSelectArea.classList.remove('hidden');
                    timeWarning.classList.add('hidden');
                } else {
                    timeSelectArea.classList.add('hidden');
                    timeWarning.classList.remove('hidden');
                    document.getElementById('trueSolarResult').classList.add('hidden');
                }
                if (document.getElementById('useTrueSolar').checked) updateTrueSolarDisplay();
            });
        });
        
        document.querySelectorAll('.module-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentModule = btn.dataset.module;
            });
        });
    });
</script>
</body>
</html>
