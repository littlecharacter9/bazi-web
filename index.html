<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>八戒命理 - 八字命理助手</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== 应用布局 ===== */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 280px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }
        .sidebar-toggle {
            display: none;
            position: absolute;
            right: 16px;
            top: 14px;
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            z-index: 11;
        }
        .logo-area {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #e6b980 0%, #e6b980 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-sub {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .new-chat-btn {
            margin: 20px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .tools-menu {
            margin: 0 12px 16px 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tools-menu-item {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: #ccc;
            margin-bottom: 4px;
        }
        .tools-menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .history-section {
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .history-title {
            font-size: 12px;
            color: #888;
            padding: 12px 12px 8px;
            letter-spacing: 0.5px;
        }
        .history-list {
            list-style: none;
            overflow-y: auto;
            max-height: 280px;
        }
        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #ccc;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .history-empty {
            padding: 12px;
            color: #888;
            text-align: center;
            font-size: 12px;
        }

        /* ===== 简洁图标（SVG） ===== */
        .history-icon {
            opacity: 0.5;
            transition: opacity 0.2s;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            border-radius: 4px;
            line-height: 1;
            width: 28px;
            height: 28px;
        }
        .history-icon:hover {
            opacity: 1;
            color: #e6b980;
            background: rgba(230, 185, 128, 0.1);
        }
        .history-icon svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }
        .history-item .history-actions {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .user-section {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
            cursor: pointer;
        }
        .user-section:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #e6b980;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #1a1a2e;
        }
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: white;
        }
        .user-email {
            font-size: 11px;
            color: #888;
        }

        /* ===== 主区域 ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #fff;
        }

        /* ===== 标题栏留白修复 ===== */
        .main-header {
            padding: 24px 30px 28px 30px;
            border-bottom: 1px solid #eee;
            background: #fff;
        }
        .main-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .main-header p {
            font-size: 13px;
            color: #888;
            margin-top: 0;
            margin-bottom: 0;
        }

        .content-area {
            flex: 1;
            padding: 24px 30px;
            overflow-y: auto;
        }

        /* ===== 通用组件 ===== */
        .time-page {
            max-width: 800px;
            margin: 0 auto;
        }
        .time-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 2px solid #eee;
        }
        .time-tab {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: #888;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            white-space: nowrap;
        }
        .time-tab.active {
            color: #e6b980;
            border-bottom-color: #e6b980;
        }
        .time-tab:hover {
            color: #e6b980;
        }
        .time-section {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .time-section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .time-section-sub {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .method-block {
            margin-bottom: 28px;
        }
        .method-block.step-three {
            margin-top: 32px;
        }
        .method-name {
            font-size: 16px;
            font-weight: 600;
            color: #e6b980;
            margin-bottom: 8px;
        }
        .method-pro-con {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 2px solid #e6b980;
        }
        .method-content {
            font-size: 14px;
            color: #333;
            line-height: 1.7;
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            margin-top: 8px;
        }
        .method-content p {
            margin-bottom: 8px;
        }
        .sub-method {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px dashed #e0e0e0;
        }
        .sub-method-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .shichen-table {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }
        .shichen-table th,
        .shichen-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .shichen-table th {
            background: #f0f0f0;
            font-weight: 600;
        }

        .contact-area {
            text-align: center;
            padding: 16px;
        }
        .wechat-qr {
            width: 140px;
            height: 140px;
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            margin: 16px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wechat-qr img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            border-radius: 8px;
        }
        .wechat-id {
            background: #f0f0f0;
            padding: 10px 16px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
            margin: 8px 0;
        }
        .wechat-id:hover {
            background: #e6b980;
            color: #1a1a2e;
        }

        .back-btn {
            margin-top: 24px;
            text-align: center;
        }
        .back-btn button {
            padding: 10px 24px;
            background: #e0e0e0;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        .back-btn button:hover {
            background: #ccc;
        }

        .diagram-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 16px 0;
            justify-content: center;
        }
        .diagram-item {
            text-align: center;
            flex: 1;
            min-width: 80px;
        }
        .diagram-canvas {
            width: 70px;
            height: 70px;
            margin: 0 auto 8px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .diagram-label {
            font-size: 11px;
            color: #666;
        }
        .face-round {
            width: 55px;
            height: 55px;
            background: #d4a574;
            border-radius: 50%;
        }
        .face-long {
            width: 50px;
            height: 65px;
            background: #d4a574;
            border-radius: 40% 40% 35% 35%;
        }
        .face-square {
            width: 55px;
            height: 55px;
            background: #d4a574;
            border-radius: 20% 20% 30% 30%;
        }

        .form-card {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group label .required {
            color: #e74c3c;
            margin-left: 4px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #e6b980;
        }
        input[type="date"] {
            min-height: 46px;
        }
        .time-option-row {
            margin-bottom: 16px;
        }
        .time-toggle {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        .time-toggle label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }
        .time-toggle input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .warning-box {
            background: #fff3e0;
            border-left: 4px solid #e6b980;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #b86b00;
        }
        .true-solar-box {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #2e7d32;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
        }
        .location-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .location-select {
            flex: 1;
            min-width: 100px;
        }
        .hidden {
            display: none !important;
        }
        .loading-text {
            color: #666;
            font-size: 12px;
            margin-top: 8px;
        }

        .verify-box {
            background: #e8f0fe;
            border-left: 4px solid #1a1a2e;
            border-radius: 12px;
            margin-top: 12px;
            margin-bottom: 20px;
            padding: 16px;
        }
        .verify-item {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        .verify-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .verify-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .verify-question {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-style: italic;
        }
        .item-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 10px;
        }
        .item-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            background: #f0f0f0;
            color: #666;
            transition: all 0.2s;
        }
        .item-btn.confirm.active {
            background: #1a1a2e;
            color: white;
        }
        .item-btn.feedback.active {
            background: #e6b980;
            color: #1a1a2e;
        }
        .verify-content {
            font-size: 14px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
            margin-bottom: 8px;
        }
        .feedback-detail {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            resize: vertical;
            font-family: inherit;
        }
        .feedback-detail.active {
            display: block;
        }
        .bazi-info {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bazi-info span {
            font-weight: 600;
            color: #1a1a2e;
        }
        .verify-toggle-icon {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .verify-toggle-icon:hover {
            background: rgba(0, 0, 0, 0.06);
        }
        .verify-toggle-icon svg {
            width: 18px;
            height: 18px;
            stroke: #666;
            stroke-width: 1.5;
            fill: none;
        }
        .verify-toggle-icon:hover svg {
            stroke: #e6b980;
        }
        .module-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .module-btn {
            padding: 8px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        .module-btn.active {
            background: #1a1a2e;
            color: white;
        }
        .result-card {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            margin-top: 20px;
        }
        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .result-content {
            font-size: 14px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }
        .action-icons {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        .action-icon {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: color 0.2s;
        }
        .action-icon:hover {
            color: #e6b980;
        }
        .btn-start {
            width: 100%;
            padding: 14px;
            background: #e6b980;
            color: #1a1a2e;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-done {
            width: 100%;
            padding: 14px;
            background: #e0e0e0;
            color: #999;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: not-allowed;
        }
        .btn-continue {
            width: 100%;
            padding: 14px;
            background: #e6b980;
            color: #1a1a2e;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .action-buttons {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 16px;
            justify-content: flex-end;
        }
        .action-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn.primary {
            background: #e6b980;
            color: #1a1a2e;
        }
        .action-btn.dark {
            background: #1a1a2e;
            color: white;
        }
        .action-btn.secondary {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
        }
        .feedback-notice {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #2e7d32;
        }
        .analysis-buttons {
            display: flex;
            gap: 16px;
            margin-top: 20px;
        }
        .analysis-buttons button {
            flex: 1;
        }

        .history-verify-content {
            font-size: 14px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
        }
        .history-verify-item {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        .history-verify-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .history-verify-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out;
        }
        .loading-dots span:nth-child(1) {
            animation-delay: 0s;
        }
        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes dotPulse {
            0%,
            60%,
            100% {
                transform: scale(1);
                opacity: 0.3;
            }
            30% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            body {
                overflow: hidden !important;
                height: 100vh !important;
                position: fixed !important;
                width: 100% !important;
            }

            .app {
                flex-direction: column !important;
                height: 100vh !important;
                overflow: hidden !important;
            }

            .sidebar {
                width: 100% !important;
                max-height: 56px !important;
                flex-shrink: 0 !important;
                overflow: hidden !important;
                position: relative !important;
                z-index: 10 !important;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
                transition: max-height 0.3s ease !important;
            }
            .sidebar.open {
                max-height: 100vh !important;
                overflow-y: auto !important;
            }
            .sidebar-toggle {
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
            }

            .logo-area {
                padding: 12px 16px !important;
                display: flex !important;
                align-items: center !important;
                justify-content: space-between !important;
            }
            .logo {
                font-size: 18px !important;
            }
            .logo-sub {
                font-size: 10px !important;
            }
            .new-chat-btn {
                margin: 12px 16px !important;
                padding: 10px 14px !important;
                font-size: 13px !important;
            }
            .tools-menu {
                margin: 0 12px 12px 12px !important;
                padding-bottom: 12px !important;
            }
            .tools-menu-item {
                padding: 8px 12px !important;
                font-size: 13px !important;
            }
            .history-section {
                padding: 0 12px !important;
            }
            .history-list {
                max-height: 200px !important;

        // ==================== 时辰确定 Tab 切换 ====================
        function initTimeTabs() {
            const tabs = document.querySelectorAll('.time-tab');
            const selfTab = document.getElementById('selfTab');
            const expertTab = document.getElementById('expertTab');

            selfTab.classList.add('hidden');
            expertTab.classList.remove('hidden');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    if (target === 'self') {
                        selfTab.classList.remove('hidden');
                        expertTab.classList.add('hidden');
                    } else {
                        selfTab.classList.add('hidden');
                        expertTab.classList.remove('hidden');
                    }
                });
            });
        }

        function initContactTabs() {

                    tab.classList.add('active');

                    introTab.classList.add('hidden');
                    deepTab.classList.add('hidden');
                    kaiGuangTab.classList.add('hidden');

                    if (target === 'intro') {
                        introTab.classList.remove('hidden');
                    } else if (target === 'deep') {
                        deepTab.classList.remove('hidden');

        // ==================== 用户ID管理 ====================
        const USER_ID_KEY = 'bazi_user_id';
        const USER_INFO_KEY = 'bazi_user_info';

        function getUserId() {
            let userId = localStorage.getItem(USER_ID_KEY);
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                localStorage.setItem(USER_ID_KEY, userId);
                localStorage.setItem(USER_INFO_KEY, JSON.stringify({
                    isLoggedIn: false,
                    nickname: '游客',
                    createdAt: new Date().toISOString()
                }));
            }
            return userId;
        }

        function getUserInfo() {
            const info = localStorage.getItem(USER_INFO_KEY);
            if (info) {
                try {
                    return JSON.parse(info);
                } catch (e) {
                    return { isLoggedIn: false, nickname: '游客' };
                }
            }
            return { isLoggedIn: false, nickname: '游客' };
        }

        function updateUserDisplay() {
            const userInfo = getUserInfo();
            const userNameEl = document.getElementById('userName');
            const userEmailEl = document.getElementById('userEmail');
            if (userInfo.isLoggedIn) {
                userNameEl.textContent = userInfo.nickname || '用户';
                userEmailEl.textContent = '已登录 · 数据云端同步';
            } else {
                userNameEl.textContent = '游客模式';
                userEmailEl.textContent = '暂未开通登录模式';
            }
        }

        function showLoginModal() {
            alert('小成本网站 暂未开通登录服务');
            return;
        }

        // ==================== 折叠图标 ====================
        const expandSVG =
            `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="4" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M8 10L12 14L16 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        const collapseSVG =
            `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="4" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M10 8L14 12L10 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

        function toggleVerifySection() {
            const wrapper = document.getElementById('verifyArea');
            const icon = document.getElementById('verifyToggleIcon');
            if (isVerifyCollapsed) {
                wrapper.classList.remove('hidden');
                icon.innerHTML = expandSVG;
                isVerifyCollapsed = false;
            } else {
                wrapper.classList.add('hidden');
                icon.innerHTML = collapseSVG;
                isVerifyCollapsed = true;
            }
        }

        // ==================== 本地存储 ====================
        const STORAGE_KEY = 'bazi_analysis_history';

        function saveAnalysisRecord(birthStr, moduleName, resultContent, baziStr, userName, verifyContent) {
            const records = getAnalysisRecords();
            const displayName = userName && userName.trim() ? `${userName.trim()} · ${moduleName}` : `匿名 · ${moduleName}`;
            let formattedVerifyContent = null;
            if (verifyContent) formattedVerifyContent = formatVerifyContentForHistory(verifyContent);
            const newRecord = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                date: new Date().toLocaleString('zh-CN'),
                birth: birthStr,
                module: moduleName,
                bazi: baziStr || '',
                result: resultContent,
                name: displayName,
                userName: userName || '',
                verifyContent: formattedVerifyContent,
                userId: getUserId()
            };
            records.unshift(newRecord);
            if (records.length > 30) records.pop();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            updateHistoryList();
        }

        function getAnalysisRecords() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (!data) return [];
            try {
                const records = JSON.parse(data);
                const currentUserId = getUserId();
                return records.map(r => ({ ...r, userId: r.userId || currentUserId }));
            } catch (e) {
                return [];
            }
        }

        function deleteAnalysisRecord(id) {
            let records = getAnalysisRecords();
            records = records.filter(r => r.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            updateHistoryList();
        }

        function renameAnalysisRecord(id) {
            const records = getAnalysisRecords();
            const record = records.find(r => r.id === id);
            if (!record) return;
            const currentName = record.userName || '匿名';
            const newName = prompt('重命名', currentName);
            if (newName && newName.trim()) {
                record.userName = newName.trim();
                record.name = `${newName.trim()} · ${record.module}`;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                updateHistoryList();
            }
        }

        function clearAllHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                localStorage.removeItem(STORAGE_KEY);
                updateHistoryList();
            }
        }

        function migrateOldRecords() {
            const records = getAnalysisRecords();
            let hasChanges = false;
            records.forEach(record => {
                if (record.verifyContent && (record.verifyContent.includes('item-btn') || record.verifyContent.includes(
                        'button') || record.verifyContent.includes('item-buttons'))) {
                    record.verifyContent = formatVerifyContentForHistory(record.verifyContent);
                    hasChanges = true;
                }
            });
            if (hasChanges) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                updateHistoryList();
            }
        }

        function formatVerifyContentForHistory(htmlContent) {
            if (!htmlContent) return '';
            const temp = document.createElement('div');
            temp.innerHTML = htmlContent;
            const selectorsToRemove = ['.item-buttons', '.feedback-detail', '.verify-question', '.feedback-notice',
                '.item-btn', '.action-buttons', 'button'
            ];
            selectorsToRemove.forEach(selector => {
                const elements = temp.querySelectorAll(selector);
                elements.forEach(el => el.remove());
            });
            const verifyItems = temp.querySelectorAll('.verify-item');
            let formattedHtml = '';
            verifyItems.forEach(item => {
                const titleElem = item.querySelector('.verify-title');
                const title = titleElem ? titleElem.outerHTML : '';
                const contentElem = item.querySelector('.verify-content');
                let content = contentElem ? contentElem.outerHTML : '';
                if (!contentElem) {
                    const cleanItem = item.cloneNode(true);
                    const removeList = cleanItem.querySelectorAll('.item-buttons, .feedback-detail, .verify-question, button');
                    removeList.forEach(el => el.remove());
                    content = cleanItem.innerHTML;
                }
                if (title && content) {
                    formattedHtml += `<div class="history-verify-item">${title}${content}</div>`;
                } else if (content) {
                    formattedHtml += `<div class="history-verify-item">${content}</div>`;
                }
            });
            if (!formattedHtml.trim()) return temp.textContent || '';
            return formattedHtml;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== 更新历史列表（SVG 简洁图标） =====
        function updateHistoryList() {
            const historyList = document.getElementById('historyList');
            if (!historyList) return;
            const records = getAnalysisRecords();
            if (records.length === 0) {
                historyList.innerHTML = '<li class="history-empty">暂无历史记录</li>';
                return;
            }
            historyList.innerHTML = '';
            records.forEach(record => {
                const li = document.createElement('li');
                li.className = 'history-item';
                const displayName = record.name || `${record.userName || '匿名'} · ${record.module}`;
                li.innerHTML = `
                    <span style="flex:1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px;">${escapeHtml(displayName)}</span>
                    <div class="history-actions">
                        <button class="history-icon history-rename" data-id="${record.id}" title="重命名">
                            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="history-icon history-delete" data-id="${record.id}" title="删除">
                            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                `;
                li.onclick = (e) => {
                    if (e.target.closest('.history-icon')) return;
                    viewHistoryRecord(record);
                };
                historyList.appendChild(li);
            });
            document.querySelectorAll('.history-delete').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    deleteAnalysisRecord(id);

        function getDayOfYear(date) {
            const start = new Date(date.getFullYear(), 0, 0);
            return Math.floor((date - start) / 86400000);
        }

        function calculateTrueSolarTime(date, hour, minute, longitude) {
            const dayOfYear = getDayOfYear(date);
            const B = (dayOfYear - 1) * 2 * Math.PI / 365;
            let eqTime = 0.258 * Math.cos(B) - 7.416 * Math.sin(B) - 3.648 * Math.cos(2 * B) - 9.228 * Math.sin(2 * B);
            let lonCorrection = (longitude - 120) * 4;
            let totalMinutes = hour * 60 + minute + lonCorrection + eqTime;
            let newHour = Math.floor(totalMinutes / 60) % 24;
            let newMinute = Math.round(totalMinutes % 60);
            if (newMinute >= 60) { newMinute -= 60;
                newHour = (newHour + 1) % 24; }
            if (newMinute < 0) { newMinute += 60;
                newHour = (newHour - 1 + 24) % 24; }
            return { hour: newHour, minute: newMinute };
        }

            const shichenMap = { 23: '子', 0: '子', 1: '丑', 2: '丑', 3: '寅', 4: '寅', 5: '卯', 6: '卯', 7: '辰', 8: '辰', 9: '巳',
                10: '巳', 11: '午', 12: '午', 13: '未', 14: '未', 15: '申', 16: '申', 17: '酉', 18: '酉', 19: '戌', 20: '戌',
                21: '亥', 22: '亥' };
            const originalShichen = shichenMap[hour] || '';

        function getActualBirthTime() {
            const useTrueSolar = document.getElementById('useTrueSolar').checked;
            const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
            if (knowTime === 'no') return null;
            let hour = parseInt(document.getElementById('hourSelect').value);
            let minute = parseInt(document.getElementById('minuteSelect').value);
            if (useTrueSolar) {
                const locationInfo = getLocationInfo();
                const dateStr = document.getElementById('dateInput').value;
                if (locationInfo && locationInfo.longitude && dateStr && !isNaN(hour) && !isNaN(minute)) {
                    const date = new Date(dateStr);
                    const trueTime = calculateTrueSolarTime(date, hour, minute, locationInfo.longitude);
                    return { hour: trueTime.hour, minute: trueTime.minute };
                }
            }
            return { hour: hour, minute: minute };
        }

        function buildBirthString() {
            const date = new Date(document.getElementById('dateInput').value);
            if (isNaN(date.getTime())) return null;
            const year = date.getFullYear(),
                month = date.getMonth() + 1,
                day = date.getDate();
            const gender = document.getElementById('genderSelect').value;
            const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
            if (!gender) return null;
            if (knowTime === 'yes') {
                const actualTime = getActualBirthTime();
                if (!actualTime || isNaN(actualTime.hour) || isNaN(actualTime.minute)) return null;
                return `${year}.${month}.${day} ${actualTime.hour}时 ${actualTime.minute}分 ${gender}`;
            } else {
                return `${year}.${month}.${day} ${gender}`;
            }
        }

        function parseVerifyContent(content) {
            const items = [];
            const sections = ['【环境方位】', '【六亲情况】', '【过去经历】', '【性格特征】'];
            for (let i = 0; i < sections.length; i++) {
                const start = content.indexOf(sections[i]);
                const end = (i < sections.length - 1) ? content.indexOf(sections[i + 1]) : content.length;
                if (start !== -1) {
                    let sectionContent = content.substring(start + sections[i].length, end).trim();
                    items.push({ title: sections[i], content: sectionContent });
                }
            }
            return items;
        }

                });

                const container = document.getElementById('analysisBtnContainer');
                if (container) {
                    container.innerHTML = `
                                <button class="btn-start" id="startAnalysisBtn">开始深度分析</button>
                            `;
                    const startBtn = document.getElementById('startAnalysisBtn');
                    if (startBtn) startBtn.onclick = startAnalysis;
                }
            }

            document.getElementById('resultCard').style.display = 'none';
        }

        function showAnalysisResult(content) {
            lastAnalysisResult = content;
            let html = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
            const userName = document.getElementById('nameInput').value;
            if (currentBirth && content) {
                saveAnalysisRecord(currentBirth, currentModuleName(), content, currentBaziStr, userName,
                    pendingVerifyContent);
                pendingVerifyContent = null;
            }
        }

        // ==================== 深度分析 ====================
        async function startAnalysis() {
            if (isLoading) return;

            hideVerifyBtn();

            isLoading = true;
            const container = document.getElementById('analysisBtnContainer');
            const startBtn = document.getElementById('startAnalysisBtn');
            startBtn.disabled = true;
            startBtn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> 分析中...';
            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ birth: currentBirth, module: currentModule })
                });
                const data = await response.json();
                if (data.success) {
                    showAnalysisResult(data.data.analysis);
                    container.innerHTML = `
                                <button class="btn-done" disabled>深度分析已完成</button>
                                <button class="btn-continue" id="continueAnalysisBtn">继续深度分析</button>
                            `;
                    document.getElementById('continueAnalysisBtn').onclick = continueAnalysis;
                } else {
                    showAnalysisResult(`分析失败：${data.error || '未知错误'}`);
                    startBtn.disabled = false;
                    startBtn.innerHTML = '开始深度分析';
                }
            } catch (err) {
                showAnalysisResult(`网络错误：${err.message}`);
                startBtn.disabled = false;
                startBtn.innerHTML = '开始深度分析';
            } finally {
                isLoading = false;
            }
        }

        async function continueAnalysis() {
            if (isLoading) return;
            isLoading = true;
            const continueBtn = document.getElementById('continueAnalysisBtn');
            continueBtn.disabled = true;
            continueBtn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> 分析中...';
            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ birth: currentBirth, module: currentModule })
                });
                const data = await response.json();
                if (data.success) {
                    showAnalysisResult(data.data.analysis);
                } else {
                    showAnalysisResult(`分析失败：${data.error || '未知错误'}`);
                }
            } catch (err) {
                showAnalysisResult(`网络错误：${err.message}`);
            } finally {
                isLoading = false;
                continueBtn.disabled = false;
                continueBtn.innerHTML = '继续深度分析';
            }
        }

        async function regenerateAnalysis() {
            if (isLoading) return;
            isLoading = true;
            const resultContent = document.getElementById('resultContent');
            resultContent.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div> 重新生成中...';
            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ birth: currentBirth, module: currentModule })
                });
                const data = await response.json();
                if (data.success) {
                    lastAnalysisResult = data.data.analysis;
                    let html = data.data.analysis.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    resultContent.innerHTML = html;
                } else {
                    resultContent.innerHTML = `分析失败：${data.error || '未知错误'}`;
                }
            } catch (err) {
                resultContent.innerHTML = `网络错误：${err.message}`;
            } finally {
                isLoading = false;
            }
        }

        function copyResult() {
            if (!lastAnalysisResult) { alert('没有可复制的内容'); return; }
            navigator.clipboard.writeText(lastAnalysisResult).then(() => alert('已复制到剪贴板')).catch(() => alert(
                '复制失败'));
        }

        function shareResult() {
            if (!lastAnalysisResult) { alert('没有可分享的内容'); return; }
            if (navigator.share) {
                navigator.share({ title: '八字命理分析结果', text: lastAnalysisResult.substring(0, 500) }).catch(() => {});
            } else {
                alert('当前浏览器不支持分享功能，请手动复制');
            }
        }

        function newChat() {
            showDefaultPanel();

            currentStep = 0;
            document.getElementById('verifyArea').classList.add('hidden');
            document.getElementById('moduleArea').classList.add('hidden');
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('baziInfoArea').classList.add('hidden');
            document.getElementById('verifyItemsContainer').innerHTML = '';
            document.getElementById('actionButtons').style.display = 'none';
            itemFeedbacks = [];
            lastAnalysisResult = '';
            pendingVerifyContent = null;
            isVerifyCollapsed = false;

            renderVerifyBtn();

            const moduleArea = document.getElementById('moduleArea');
            if (moduleArea) {
                moduleArea.classList.add('hidden');
                const container = document.getElementById('analysisBtnContainer');
                if (container) {
                    container.innerHTML = `
                                <button class="btn-start" id="startAnalysisBtn">开始深度分析</button>
                            `;
                    const startBtn = document.getElementById('startAnalysisBtn');
                    if (startBtn) startBtn.onclick = startAnalysis;
                }
            }

            const toggleIcon = document.getElementById('verifyToggleIcon');
            if (toggleIcon) toggleIcon.innerHTML = expandSVG;
        }

        // ==================== 页面初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            getUserId();
            updateUserDisplay();

            initMinuteSelect();
            loadRegionData();
            updateHistoryList();
            migrateOldRecords();
            initWechatCopy();
            initTimeTabs();
            initContactTabs();

            renderVerifyBtn();

            document.getElementById('timeToolBtn').onclick = showTimePanel;
            document.getElementById('contactToolBtn').onclick = showContactPanel;
            document.getElementById('backToMainBtn').onclick = showDefaultPanel;
            document.getElementById('backToMainFromContactBtn').onclick = showDefaultPanel;

            const toggleIcon = document.getElementById('verifyToggleIcon');
            if (toggleIcon) toggleIcon.onclick = toggleVerifySection;
            document.getElementById('submitFeedbackBtn').onclick = submitFeedback;
            document.getElementById('confirmOverallBtn').onclick = confirmAllAccurate;
            const startAnalysisBtn = document.getElementById('startAnalysisBtn');
            if (startAnalysisBtn) startAnalysisBtn.onclick = startAnalysis;
            document.getElementById('copyResultBtn').onclick = copyResult;
            document.getElementById('regenerateResultBtn').onclick = regenerateAnalysis;
            document.getElementById('shareResultBtn').onclick = shareResult;
            document.getElementById('newChatBtn').onclick = newChat;

            const userSection = document.getElementById('userSection');
            if (userSection) {
                userSection.onclick = showLoginModal;
            }

            document.getElementById('provinceSelect').addEventListener('change', () => { updateCitySelect(); if (document
                    .getElementById('useTrueSolar').checked) updateTrueSolarDisplay(); });
            document.getElementById('citySelect').addEventListener('change', () => { updateDistrictSelect(); if (document
                    .getElementById('useTrueSolar').checked) updateTrueSolarDisplay(); });
            document.getElementById('districtSelect').addEventListener('change', () => { if (document.getElementById(
                    'useTrueSolar').checked) updateTrueSolarDisplay(); });
            document.getElementById('useTrueSolar').addEventListener('change', updateTrueSolarDisplay);
            document.getElementById('dateInput').addEventListener('change', () => { if (document.getElementById(
                    'useTrueSolar').checked) updateTrueSolarDisplay(); });
            document.getElementById('hourSelect').addEventListener('change', () => { if (document.getElementById(
                    'useTrueSolar').checked) updateTrueSolarDisplay(); });
            document.getElementById('minuteSelect').addEventListener('change', () => { if (document.getElementById(
                    'useTrueSolar').checked) updateTrueSolarDisplay(); });

            document.querySelectorAll('input[name="knowTime"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const timeSelectArea = document.getElementById('timeSelectArea');
                    const timeWarning = document.getElementById('timeWarning');
                    if (e.target.value === 'yes') {
                        timeSelectArea.classList.remove('hidden');
                        timeWarning.classList.add('hidden');
                    } else {
                        timeSelectArea.classList.add('hidden');
                        timeWarning.classList.remove('hidden');
                        document.getElementById('trueSolarResult').classList.add('hidden');
                    }
                    if (document.getElementById('useTrueSolar').checked) updateTrueSolarDisplay();
                });
            });

            document.querySelectorAll('.module-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentModule = btn.dataset.module;
                });
            });
        });
    </script>

</body>
</html>
