<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>八戒命理 - 八字命理助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1c1c1e;
            height: 100vh;
            overflow: hidden;
        }

        /* 整体布局 */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ========== 左侧边栏 ========== */
        .sidebar {
            width: 280px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.3s;
            overflow-y: auto;
        }

        /* Logo 区域 */
        .logo-area {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #e6b980 0%, #e6b980 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .logo-sub {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        /* 新对话按钮（有实际功能） */
        .new-chat-btn {
            margin: 20px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .new-chat-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }

        /* 历史记录区域（有实际功能） */
        .history-section {
            flex: 1;
            padding: 0 12px;
        }
        .history-title {
            font-size: 12px;
            color: #888;
            padding: 12px 12px 8px;
            letter-spacing: 0.5px;
        }
        .history-list {
            list-style: none;
        }
        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 13px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.08);
        }

        /* 用户信息区域（暂无实质功能，保留为 UI） */
        .user-section {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: auto;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: default;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #e6b980;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #1a1a2e;
        }
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: white;
        }
        .user-email {
            font-size: 11px;
            color: #888;
        }

        /* ========== 右侧主内容区 ========== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #fff;
        }

        /* 头部 */
        .main-header {
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
            background: #fff;
        }
        .main-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
        }
        .main-header p {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            padding: 24px 30px;
            overflow-y: auto;
        }

        /* 表单卡片 */
        .form-card {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        /* 输入行 */
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background: #fff;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #e6b980;
            box-shadow: 0 0 0 3px rgba(230,185,128,0.1);
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #999;
            cursor: default;
        }
        .checkbox-label input {
            cursor: pointer;
        }
        .disabled-note {
            font-size: 11px;
            color: #ccc;
            margin-left: 8px;
        }

        /* 模块按钮 */
        .module-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .module-btn {
            padding: 8px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .module-btn.active {
            background: #1a1a2e;
            color: white;
        }

        /* 分析按钮 */
        .analyze-btn {
            width: 100%;
            padding: 14px;
            background: #e6b980;
            color: #1a1a2e;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .analyze-btn:hover {
            background: #d4a06a;
        }
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 结果卡片 */
        .result-card {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 24px;
        }
        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .result-content {
            font-size: 14px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .result-content h3 {
            font-size: 15px;
            margin: 16px 0 8px;
            color: #1a1a2e;
        }
        .result-content h3:first-child {
            margin-top: 0;
        }
        .result-content p {
            margin: 8px 0;
        }

        /* 加载动画 */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                z-index: 100;
                height: 100%;
                transition: left 0.3s;
            }
            .sidebar.open {
                left: 0;
            }
            .main {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 左侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="logo">🐷 八戒命理</div>
            <div class="logo-sub">子平八字 · 专业解析</div>
        </div>

        <!-- 新对话按钮：清空当前结果 -->
        <div class="new-chat-btn" id="newChatBtn">
            <span>+</span> 新对话
        </div>

        <div class="history-section">
            <div class="history-title">最近对话</div>
            <ul class="history-list" id="historyList">
                <li class="history-item" data-birth="2001.10.30 18时 男">2001.10.30 男</li>
            </ul>
        </div>

        <!-- 用户信息：目前仅为 UI 占位，无登录功能 -->
        <div class="user-section">
            <div class="user-info">
                <div class="user-avatar">八</div>
                <div>
                    <div class="user-name">游客模式</div>
                    <div class="user-email">登录功能开发中</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧主内容 -->
    <div class="main">
        <div class="main-header">
            <h2>八字命盘分析</h2>
            <p>输入生辰信息，AI 辅助解析命盘格局</p>
        </div>

        <div class="content-area">
            <div class="form-card">
                <div class="form-row">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="nameInput" placeholder="选填">
                    </div>
                    <div class="form-group">
                        <label>性别</label>
                        <select id="genderSelect">
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>出生日期</label>
                        <input type="date" id="dateInput" value="2001-10-30">
                    </div>
                    <div class="form-group">
                        <label>出生时间</label>
                        <select id="hourSelect">
                            <option value="23">23时 子时</option>
                            <option value="0">0时 子时</option>
                            <option value="1">1时 丑时</option>
                            <option value="2">2时 丑时</option>
                            <option value="3">3时 寅时</option>
                            <option value="4">4时 寅时</option>
                            <option value="5">5时 卯时</option>
                            <option value="6">6时 卯时</option>
                            <option value="7">7时 辰时</option>
                            <option value="8">8时 辰时</option>
                            <option value="9">9时 巳时</option>
                            <option value="10">10时 巳时</option>
                            <option value="11">11时 午时</option>
                            <option value="12">12时 午时</option>
                            <option value="13">13时 未时</option>
                            <option value="14">14时 未时</option>
                            <option value="15">15时 申时</option>
                            <option value="16">16时 申时</option>
                            <option value="17">17时 酉时</option>
                            <option value="18" selected>18时 酉时</option>
                            <option value="19">19时 戌时</option>
                            <option value="20">20时 戌时</option>
                            <option value="21">21时 亥时</option>
                            <option value="22">22时 亥时</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>分钟</label>
                        <select id="minuteSelect">
                            <option value="0">00分</option>
                            <option value="15">15分</option>
                            <option value="30">30分</option>
                            <option value="45">45分</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>出生地点</label>
                        <input type="text" id="locationInput" placeholder="选填（暂未启用）">
                    </div>
                </div>

                <!-- 真太阳时/早晚子时：UI 预留，目前无实质功能 -->
                <div class="checkbox-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="useTrueSolar"> 使用真太阳时
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="useEarlyLate"> 使用早晚子时
                    </label>
                    <span class="disabled-note">（功能开发中）</span>
                </div>

                <!-- 模块选择 -->
                <div class="module-buttons">
                    <button class="module-btn" data-module="overview">综合</button>
                    <button class="module-btn active" data-module="career">事业</button>
                    <button class="module-btn" data-module="wealth">财运</button>
                    <button class="module-btn" data-module="marriage">婚姻</button>
                    <button class="module-btn" data-module="liunian">流年</button>
                </div>

                <button class="analyze-btn" id="analyzeBtn">开始计算八字</button>
            </div>

            <!-- 结果区域 -->
            <div class="result-card" id="resultCard" style="display: none;">
                <div class="result-title">📊 分析结果</div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://bazi-api-production-0123.up.railway.app';
    let currentModule = 'career';
    let isLoading = false;

    // DOM 元素
    const nameInput = document.getElementById('nameInput');
    const genderSelect = document.getElementById('genderSelect');
    const dateInput = document.getElementById('dateInput');
    const hourSelect = document.getElementById('hourSelect');
    const minuteSelect = document.getElementById('minuteSelect');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultCard = document.getElementById('resultCard');
    const resultContent = document.getElementById('resultContent');
    const newChatBtn = document.getElementById('newChatBtn');

    // 模块切换
    document.querySelectorAll('.module-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentModule = btn.dataset.module;
        });
    });

    // 构建生辰字符串
    function buildBirthString() {
        const date = new Date(dateInput.value);
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();
        let hour = parseInt(hourSelect.value);
        const minute = parseInt(minuteSelect.value);
        const gender = genderSelect.value;

        return `${year}.${month}.${day} ${hour}时 ${minute}分 ${gender}`;
    }

    // 添加历史记录
    function addHistory(birthStr) {
        const historyList = document.getElementById('historyList');
        const existingItems = Array.from(historyList.querySelectorAll('.history-item'));
        const exists = existingItems.some(item => item.dataset.birth === birthStr);
        if (!exists) {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.dataset.birth = birthStr;
            li.textContent = birthStr.length > 30 ? birthStr.substring(0, 30) + '...' : birthStr;
            li.onclick = () => {
                const parts = birthStr.match(/(\d{4}\.\d{1,2}\.\d{1,2})\s+(\d{1,2})时\s+(\d+)分\s+([男女])/);
                if (parts) {
                    const dateParts = parts[1].split('.');
                    dateInput.value = `${dateParts[0]}-${dateParts[1].padStart(2,'0')}-${dateParts[2].padStart(2,'0')}`;
                    hourSelect.value = parts[2];
                    minuteSelect.value = parts[3];
                    genderSelect.value = parts[4];
                }
            };
            historyList.insertBefore(li, historyList.firstChild);
        }
    }

    // 显示结果
    function showResult(content) {
        let html = content.replace(/\n/g, '<br>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
        resultContent.innerHTML = html;
        resultCard.style.display = 'block';
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 清空结果（新对话）
    function newChat() {
        resultCard.style.display = 'none';
        resultContent.innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 分析请求
    async function analyze() {
        if (isLoading) return;

        const birth = buildBirthString();
        if (!birth) {
            alert('请填写出生信息');
            return;
        }

        isLoading = true;
        analyzeBtn.disabled = true;
        analyzeBtn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> 分析中...';

        const startTime = Date.now();
        console.log(`[请求开始] ${new Date().toISOString()} - 生辰: ${birth}, 模块: ${currentModule}`);

        try {
            const response = await fetch(`${API_URL}/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ birth: birth, module: currentModule })
            });
            const data = await response.json();

            const duration = Date.now() - startTime;
            console.log(`[请求成功] ${new Date().toISOString()} - 耗时: ${duration}ms`);

            if (data.success) {
                showResult(data.data.analysis);
                addHistory(birth);
            } else {
                showResult(`❌ 分析失败：${data.error || '未知错误'}`);
            }
        } catch (err) {
            console.error(`[请求失败] ${err}`);
            showResult(`❌ 网络错误：${err.message}。请稍后重试。`);
        } finally {
            isLoading = false;
            analyzeBtn.disabled = false;
            analyzeBtn.innerHTML = '开始计算八字';
        }
    }

    // 事件绑定
    analyzeBtn.addEventListener('click', analyze);
    newChatBtn.addEventListener('click', newChat);

    // 回车快捷分析
    const inputs = [nameInput, dateInput, hourSelect, minuteSelect];
    inputs.forEach(input => {
        if (input) input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyze();
        });
    });
</script>
</body>
</html>
