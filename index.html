<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AI命理助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .label {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            display: block;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 16px;
            background: #f9f9f9;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #1a1a2e;
            background: white;
        }
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: -12px;
            margin-bottom: 16px;
        }
        .module-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .module-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 0;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        .module-btn.active {
            background: #1a1a2e;
            color: white;
        }
        .analyze-btn {
            width: 100%;
            padding: 16px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .analyze-btn:hover {
            background: #16213e;
        }
        .analyze-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result-card {
            background: #f9f9f9;
            border-radius: 16px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .result-title {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .result-content {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .verify-card {
            margin-top: 16px;
            background: #fff8e7;
            border-left: 4px solid #ffc107;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>AI命理助手</h1>
            <div class="subtitle">子平八字·专业分析</div>

            <div class="label">出生信息</div>
            <input type="text" id="birth" placeholder="例如：2001.10.30 18时 男" value="2001.10.30 18时 男">
            <div class="hint">格式：年.月.日 时 性别 | 例：2001.10.30 18时 男</div>

            <div class="label">分析模块</div>
            <div class="module-buttons">
                <button class="module-btn" data-module="overview">综合</button>
                <button class="module-btn active" data-module="career">事业</button>
                <button class="module-btn" data-module="wealth">财运</button>
                <button class="module-btn" data-module="marriage">婚姻</button>
                <button class="module-btn" data-module="liunian">流年</button>
            </div>

            <button class="analyze-btn" id="analyzeBtn">开始分析</button>

            <div id="resultArea" style="display: none;">
                <div class="result-card">
                    <div class="result-title">📊 分析结果</div>
                    <div class="result-content" id="resultContent"></div>
                </div>
                <div class="result-card verify-card" id="verifyCard" style="display: none;">
                    <div class="result-title">✅ 八字验证</div>
                    <div class="result-content" id="verifyContent"></div>
                </div>
            </div>
        </div>
        <div class="footer">
            以上内容由AI生成，仅供参考
        </div>
    </div>

    <script>
        // API 地址
        const API_URL = 'https://bazi-api-production-0123.up.railway.app';

        let currentModule = 'career';
        let isLoading = false;

        // 模块切换
        document.querySelectorAll('.module-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentModule = btn.dataset.module;
                console.log(`[模块切换] ${new Date().toISOString()} - ${currentModule}`);
            });
        });

        // 开始分析
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            if (isLoading) {
                console.log('[请求拦截] 已有请求在处理中');
                return;
            }

            const birth = document.getElementById('birth').value.trim();
            if (!birth) {
                alert('请输入出生信息');
                return;
            }

            isLoading = true;
            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 分析中...';

            // 隐藏旧结果
            document.getElementById('resultArea').style.display = 'none';

            console.log(`[请求开始] ${new Date().toISOString()} - 生辰: ${birth}, 模块: ${currentModule}`);

            const startTime = Date.now();

            try {
                // 调用分析接口
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ birth: birth, module: currentModule })
                });
                const data = await response.json();

                const duration = Date.now() - startTime;
                console.log(`[请求成功] ${new Date().toISOString()} - 耗时: ${duration}ms`);

                if (data.success) {
                    document.getElementById('resultContent').innerHTML = data.data.analysis.replace(/\n/g, '<br>');
                    document.getElementById('resultArea').style.display = 'block';
                    document.getElementById('verifyCard').style.display = 'none';
                } else {
                    document.getElementById('resultContent').innerHTML = `分析失败：${data.error}`;
                    document.getElementById('resultArea').style.display = 'block';
                }

                // 同时请求验证接口（可选）
                const verifyResponse = await fetch(`${API_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ birth: birth })
                });
                const verifyData = await verifyResponse.json();
                if (verifyData.success) {
                    document.getElementById('verifyContent').innerHTML = verifyData.data.verify.replace(/\n/g, '<br>');
                    document.getElementById('verifyCard').style.display = 'block';
                }

            } catch (err) {
                console.error(`[请求失败] ${err}`);
                document.getElementById('resultContent').innerHTML = `网络错误：${err.message}`;
                document.getElementById('resultArea').style.display = 'block';
            } finally {
                isLoading = false;
                btn.disabled = false;
                btn.innerHTML = '开始分析';
                console.log(`[请求结束] ${new Date().toISOString()}`);
            }
        });
    </script>
</body>
</html>
