<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>八戒命理 - 八字命理助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1c1c1e;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ========== 左侧边栏 ========== */
        .sidebar {
            width: 280px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .logo-area {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #e6b980 0%, #e6b980 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .logo-sub {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .new-chat-btn {
            margin: 20px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .new-chat-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .history-section {
            flex: 1;
            padding: 0 12px;
        }
        .history-title {
            font-size: 12px;
            color: #888;
            padding: 12px 12px 8px;
        }
        .history-list {
            list-style: none;
        }
        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.08);
        }

        .user-section {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: auto;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #e6b980;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #1a1a2e;
        }
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: white;
        }
        .user-email {
            font-size: 11px;
            color: #888;
        }

        /* ========== 右侧主内容区 ========== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #fff;
        }

        .main-header {
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
            background: #fff;
        }
        .main-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
        }
        .main-header p {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        .content-area {
            flex: 1;
            padding: 24px 30px;
            overflow-y: auto;
        }

        .form-card {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group label .required {
            color: #e74c3c;
            margin-left: 4px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #e6b980;
            box-shadow: 0 0 0 3px rgba(230,185,128,0.1);
        }

        /* 时间选项 */
        .time-option-row {
            margin-bottom: 16px;
        }
        .time-toggle {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        .time-toggle label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }
        .time-toggle input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .warning-box {
            background: #fff3e0;
            border-left: 4px solid #e6b980;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #b86b00;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #999;
        }
        .disabled-note {
            font-size: 11px;
            color: #ccc;
            margin-left: 8px;
        }

        .module-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .module-btn {
            padding: 8px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .module-btn.active {
            background: #1a1a2e;
            color: white;
        }

        .analyze-btn {
            width: 100%;
            padding: 14px;
            background: #e6b980;
            color: #1a1a2e;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .analyze-btn:hover {
            background: #d4a06a;
        }
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-card {
            background: #f9f9fb;
            border-radius: 20px;
            padding: 24px;
        }
        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .result-content {
            font-size: 14px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .result-content h3 {
            font-size: 15px;
            margin: 16px 0 8px;
            color: #1a1a2e;
        }
        .result-content h3:first-child {
            margin-top: 0;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                z-index: 100;
                height: 100%;
                transition: left 0.3s;
            }
            .content-area {
                padding: 16px;
            }
            .form-row {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="logo">八戒命理</div>
            <div class="logo-sub">AI解析 · 仅供参考</div>
        </div>
        <div class="new-chat-btn" id="newChatBtn">
            <span>+</span> 新对话
        </div>
        <div class="history-section">
            <div class="history-title">最近对话</div>
            <ul class="history-list" id="historyList"></ul>
        </div>
        <div class="user-section">
            <div class="user-info">
                <div class="user-avatar">八</div>
                <div>
                    <div class="user-name">游客模式</div>
                    <div class="user-email">登录功能开发中</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="main-header">
            <h2>八字命盘分析</h2>
            <p>输入生辰信息，AI 辅助解析命盘格局</p>
        </div>

        <div class="content-area">
            <div class="form-card">
                <div class="form-row">
                    <div class="form-group">
                        <label>姓名 <span class="required">(选填)</span></label>
                        <input type="text" id="nameInput" placeholder="请输入姓名">
                    </div>
                    <div class="form-group">
                        <label>性别 <span class="required">*</span></label>
                        <select id="genderSelect">
                            <option value="">请选择</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>出生日期 <span class="required">*</span></label>
                        <input type="date" id="dateInput" value="">
                    </div>
                </div>

                <!-- 是否知道出生时间 -->
                <div class="time-option-row">
                    <div class="time-toggle">
                        <label>
                            <input type="radio" name="knowTime" value="yes" checked> 我知道出生时间
                        </label>
                        <label>
                            <input type="radio" name="knowTime" value="no"> 不清楚出生时间
                        </label>
                    </div>
                    <div id="timeWarning" class="warning-box" style="display: none;">
                        ⚠️ 未提供准确出生时间，分析准确率约30%-40%，结果仅供参考。
                    </div>
                </div>

                <!-- 时间选择区域（默认显示） -->
                <div id="timeSelectArea">
                    <div class="form-row">
                        <div class="form-group">
                            <label>出生时间</label>
                            <select id="hourSelect">
                                <option value="">请选择时辰</option>
                                <option value="23">23时 子时 (23:00-00:59)</option>
                                <option value="0">0时 子时 (00:00-00:59)</option>
                                <option value="1">1时 丑时 (01:00-02:59)</option>
                                <option value="2">2时 丑时 (01:00-02:59)</option>
                                <option value="3">3时 寅时 (03:00-04:59)</option>
                                <option value="4">4时 寅时 (03:00-04:59)</option>
                                <option value="5">5时 卯时 (05:00-06:59)</option>
                                <option value="6">6时 卯时 (05:00-06:59)</option>
                                <option value="7">7时 辰时 (07:00-08:59)</option>
                                <option value="8">8时 辰时 (07:00-08:59)</option>
                                <option value="9">9时 巳时 (09:00-10:59)</option>
                                <option value="10">10时 巳时 (09:00-10:59)</option>
                                <option value="11">11时 午时 (11:00-12:59)</option>
                                <option value="12">12时 午时 (11:00-12:59)</option>
                                <option value="13">13时 未时 (13:00-14:59)</option>
                                <option value="14">14时 未时 (13:00-14:59)</option>
                                <option value="15">15时 申时 (15:00-16:59)</option>
                                <option value="16">16时 申时 (15:00-16:59)</option>
                                <option value="17">17时 酉时 (17:00-18:59)</option>
                                <option value="18">18时 酉时 (17:00-18:59)</option>
                                <option value="19">19时 戌时 (19:00-20:59)</option>
                                <option value="20">20时 戌时 (19:00-20:59)</option>
                                <option value="21">21时 亥时 (21:00-22:59)</option>
                                <option value="22">22时 亥时 (21:00-22:59)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>分钟</label>
                            <select id="minuteSelect">
                                <option value="0">00分</option>
                                <option value="15">15分</option>
                                <option value="30">30分</option>
                                <option value="45">45分</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>出生地点</label>
                        <input type="text" id="locationInput" placeholder="选填（暂未启用）">
                    </div>
                </div>

                <div class="checkbox-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="useTrueSolar"> 使用真太阳时
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="useEarlyLate"> 使用早晚子时
                    </label>
                    <span class="disabled-note">（功能开发中）</span>
                </div>

                <div class="module-buttons">
                    <button class="module-btn" data-module="overview">综合</button>
                    <button class="module-btn active" data-module="career">事业</button>
                    <button class="module-btn" data-module="wealth">财运</button>
                    <button class="module-btn" data-module="marriage">婚姻</button>
                    <button class="module-btn" data-module="liunian">流年</button>
                </div>

                <button class="analyze-btn" id="analyzeBtn">开始计算八字</button>
            </div>

            <div class="result-card" id="resultCard" style="display: none;">
                <div class="result-title">📊 分析结果</div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://bazi-api-production-0123.up.railway.app';
    let currentModule = 'career';
    let isLoading = false;

    // DOM 元素
    const genderSelect = document.getElementById('genderSelect');
    const dateInput = document.getElementById('dateInput');
    const hourSelect = document.getElementById('hourSelect');
    const minuteSelect = document.getElementById('minuteSelect');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultCard = document.getElementById('resultCard');
    const resultContent = document.getElementById('resultContent');
    const newChatBtn = document.getElementById('newChatBtn');
    const timeWarning = document.getElementById('timeWarning');
    const timeSelectArea = document.getElementById('timeSelectArea');
    const knowTimeRadios = document.querySelectorAll('input[name="knowTime"]');

    // 时间选项切换
    knowTimeRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            if (e.target.value === 'yes') {
                timeSelectArea.style.display = 'block';
                timeWarning.style.display = 'none';
                hourSelect.required = true;
            } else {
                timeSelectArea.style.display = 'none';
                timeWarning.style.display = 'block';
                hourSelect.required = false;
            }
        });
    });

    // 模块切换
    document.querySelectorAll('.module-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentModule = btn.dataset.module;
        });
    });

    // 构建生辰字符串
    function buildBirthString() {
        const date = new Date(dateInput.value);
        if (isNaN(date.getTime())) return null;
        
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const gender = genderSelect.value;
        
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        
        if (knowTime === 'yes') {
            let hour = parseInt(hourSelect.value);
            const minute = parseInt(minuteSelect.value);
            if (isNaN(hour)) return null;
            return `${year}.${month}.${day} ${hour}时 ${minute}分 ${gender}`;
        } else {
            // 不知道时间，只传年月日和性别
            return `${year}.${month}.${day} ${gender}`;
        }
    }

    // 验证必填项
    function validateForm() {
        if (!genderSelect.value) {
            alert('请选择性别');
            return false;
        }
        if (!dateInput.value) {
            alert('请选择出生日期');
            return false;
        }
        const knowTime = document.querySelector('input[name="knowTime"]:checked').value;
        if (knowTime === 'yes') {
            if (!hourSelect.value) {
                alert('请选择出生时间');
                return false;
            }
        }
        return true;
    }

    // 添加历史记录
    function addHistory(birthStr) {
        const historyList = document.getElementById('historyList');
        const existingItems = Array.from(historyList.querySelectorAll('.history-item'));
        const exists = existingItems.some(item => item.dataset.birth === birthStr);
        if (!exists) {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.dataset.birth = birthStr;
            li.textContent = birthStr.length > 30 ? birthStr.substring(0, 30) + '...' : birthStr;
            li.onclick = () => {
                // 解析历史记录并填充表单
                const match = birthStr.match(/(\d{4}\.\d{1,2}\.\d{1,2})\s+(\d{1,2})时\s+(\d+)分\s+([男女])/);
                if (match) {
                    const dateParts = match[1].split('.');
                    dateInput.value = `${dateParts[0]}-${dateParts[1].padStart(2,'0')}-${dateParts[2].padStart(2,'0')}`;
                    hourSelect.value = match[2];
                    minuteSelect.value = match[3];
                    genderSelect.value = match[4];
                    document.querySelector('input[name="knowTime"][value="yes"]').checked = true;
                    timeSelectArea.style.display = 'block';
                    timeWarning.style.display = 'none';
                } else {
                    // 无时间的历史记录
                    const simpleMatch = birthStr.match(/(\d{4}\.\d{1,2}\.\d{1,2})\s+([男女])/);
                    if (simpleMatch) {
                        const dateParts = simpleMatch[1].split('.');
                        dateInput.value = `${dateParts[0]}-${dateParts[1].padStart(2,'0')}-${dateParts[2].padStart(2,'0')}`;
                        genderSelect.value = simpleMatch[2];
                        document.querySelector('input[name="knowTime"][value="no"]').checked = true;
                        timeSelectArea.style.display = 'none';
                        timeWarning.style.display = 'block';
                    }
                }
            };
            historyList.insertBefore(li, historyList.firstChild);
        }
    }

    function showResult(content) {
        let html = content.replace(/\n/g, '<br>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
        resultContent.innerHTML = html;
        resultCard.style.display = 'block';
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function newChat() {
        resultCard.style.display = 'none';
        resultContent.innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function analyze() {
        if (isLoading) return;
        if (!validateForm()) return;

        const birth = buildBirthString();
        if (!birth) {
            alert('请完整填写必填信息');
            return;
        }

        isLoading = true;
        analyzeBtn.disabled = true;
        analyzeBtn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> 分析中...';

        console.log(`[请求开始] 生辰: ${birth}, 模块: ${currentModule}`);

        try {
            const response = await fetch(`${API_URL}/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ birth: birth, module: currentModule })
            });
            const data = await response.json();

            if (data.success) {
                showResult(data.data.analysis);
                addHistory(birth);
            } else {
                showResult(`❌ 分析失败：${data.error || '未知错误'}`);
            }
        } catch (err) {
            console.error(err);
            showResult(`❌ 网络错误：${err.message}。请稍后重试。`);
        } finally {
            isLoading = false;
            analyzeBtn.disabled = false;
            analyzeBtn.innerHTML = '开始计算八字';
        }
    }

    analyzeBtn.addEventListener('click', analyze);
    newChatBtn.addEventListener('click', newChat);
</script>
</body>
</html>
